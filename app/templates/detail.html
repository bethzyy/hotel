<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>酒店详情 - 酒店搜索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-building"></i> 酒店搜索
            </a>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm me-2" onclick="goBack()">
                    <i class="bi bi-arrow-left"></i> 返回
                </button>
                <a class="nav-link text-white" href="#" id="favoritesLink">
                    <i class="bi bi-heart"></i> 收藏
                    <span class="badge bg-danger" id="favoritesCount">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <!-- Loading Placeholder -->
        <div id="loadingPlaceholder" class="text-center py-5">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 text-muted">加载酒店详情...</p>
        </div>

        <!-- Hotel Detail Content -->
        <div id="hotelContent" style="display: none;">
            <!-- Provider Badge -->
            <div class="mb-3 page-enter">
                <span class="badge bg-info" id="providerBadge">
                    <i class="bi bi-globe2 me-1"></i> RollingGo
                </span>
            </div>

            <!-- Header Section -->
            <div class="hotel-header mb-4">
                <div class="row align-items-center">
                    <div class="col-lg-8">
                        <h2 id="hotelName" class="mb-2 fw-bold"></h2>
                        <p id="hotelAddress" class="text-muted mb-3"></p>
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <span id="hotelStars" class="star-rating"></span>
                            <span id="hotelRating" class="rating-badge" style="display: none;"></span>
                            <span id="hotelDistance" class="text-muted"></span>
                        </div>
                        <!-- Brand info -->
                        <div id="brandInfo" class="mt-2" style="display: none;">
                            <span id="brandName" class="badge bg-light text-dark border"></span>
                        </div>
                    </div>
                    <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
                        <div class="price-section">
                            <span class="text-muted small">起</span>
                            <span id="hotelPrice" class="display-5 text-primary fw-bold" style="font-family: var(--font-number);"></span>
                            <span class="text-muted">/晚</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Image Gallery -->
            <div id="imageSection" class="row mb-4" style="display: none;">
                <div class="col-12">
                    <div id="mainImage" class="hotel-main-image" onclick="openLightbox(currentImageUrl)"></div>
                    <div id="imageGallery" class="image-gallery mt-3"></div>
                    <div id="moreImagesBtn" class="text-center mt-2" style="display: none;">
                        <button class="btn btn-outline-primary btn-sm" onclick="showAllImages()">
                            <i class="bi bi-images me-1"></i> 查看更多图片 (<span id="totalImages">0</span>张)
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tags -->
            <div id="hotelTags" class="mb-4"></div>

            <!-- Description -->
            <div id="descriptionSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-info-circle text-primary me-2"></i> 酒店介绍
                    </h5>
                    <div id="hotelDescription" class="text-muted mb-0"></div>
                </div>
            </div>

            <!-- Location Map -->
            <div id="mapSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title mb-3">
                        <i class="bi bi-geo-alt text-primary me-2"></i> 酒店位置
                    </h5>
                    <div id="hotelMap" style="height: 300px; border-radius: var(--radius-lg);"></div>
                    <p id="mapAddress" class="text-muted small mt-2"></p>
                </div>
            </div>

            <!-- Amenities -->
            <div id="amenitiesSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-check2-circle text-primary me-2"></i> 酒店设施
                    </h5>
                    <div id="amenitiesList" class="row g-3"></div>
                </div>
            </div>

            <!-- Booking Dates -->
            <div id="bookingDatesSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title mb-3">
                        <i class="bi bi-calendar-check text-primary me-2"></i> 预订日期
                    </h5>
                    <div class="d-flex align-items-center gap-4">
                        <div>
                            <span class="text-muted small">入住</span>
                            <div id="checkInDate" class="fw-bold"></div>
                        </div>
                        <i class="bi bi-arrow-right text-muted"></i>
                        <div>
                            <span class="text-muted small">退房</span>
                            <div id="checkOutDate" class="fw-bold"></div>
                        </div>
                        <div class="ms-auto">
                            <span class="badge bg-primary bg-opacity-10 text-primary" id="stayNights"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Room Plans -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-door-open text-primary me-2"></i> 可用房型
                    </h5>
                    <div id="roomPlansList">
                        <div class="text-center py-3 text-muted">
                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                            加载房型信息...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Price Comparison Section -->
            <div id="priceComparisonSection" class="card mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-graph-up-arrow text-primary me-2"></i> 多平台比价
                        </h5>
                        <button id="refreshComparison" class="btn btn-sm btn-outline-secondary" onclick="loadPriceComparison()">
                            <i class="bi bi-arrow-clockwise me-1"></i> 刷新
                        </button>
                    </div>

                    <!-- Loading State -->
                    <div id="comparisonLoading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="text-muted mt-2 mb-0">正在查询其他平台价格...</p>
                    </div>

                    <!-- Comparison Results -->
                    <div id="comparisonResults" style="display: none;">
                        <!-- Best Price Banner -->
                        <div id="bestPriceBanner" class="alert alert-success d-flex align-items-center mb-3" style="display: none !important;">
                            <i class="bi bi-trophy-fill me-2"></i>
                            <span id="bestPriceText"></span>
                        </div>

                        <!-- Comparison Table -->
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th style="width: 30%;">平台</th>
                                        <th style="width: 35%;">价格</th>
                                        <th style="width: 35%;">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="comparisonTableBody">
                                </tbody>
                                <tbody id="externalPricesBody">
                                </tbody>
                            </table>
                        </div>

                        <!-- Match Info -->
                        <div id="matchInfo" class="mt-3 text-muted small" style="display: none;">
                            <i class="bi bi-info-circle me-1"></i>
                            <span id="matchInfoText"></span>
                        </div>
                    </div>

                    <!-- Error State -->
                    <div id="comparisonError" class="alert alert-warning mb-0" style="display: none;">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <span id="comparisonErrorText"></span>
                    </div>

                    <!-- No Results State -->
                    <div id="comparisonNoResults" class="text-center py-3" style="display: none;">
                        <i class="bi bi-search display-4 text-muted"></i>
                        <p class="text-muted mt-2 mb-0">未找到其他平台的价格信息</p>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-3 mb-4 flex-wrap">
                <!-- 预订链接按钮 (booking_url from RollingGo) -->
                <a id="bookingUrlBtn" class="btn btn-primary btn-lg" style="display: none;" target="_blank">
                    <i class="bi bi-box-arrow-up-right me-2"></i> 前往 RollingGo 预订
                </a>
                <button id="favoriteBtn" class="btn btn-outline-danger" onclick="toggleFavorite()">
                    <i class="bi bi-heart me-2"></i> <span>收藏</span>
                </button>
                <button class="btn btn-outline-primary" onclick="shareHotel()">
                    <i class="bi bi-share me-2"></i> 分享
                </button>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-danger" style="display: none;">
            <i class="bi bi-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center text-muted">
            <p>酒店搜索服务由 RollingGo 提供</p>
        </div>
    </footer>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">加载中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Global variables
        let currentHotel = null;
        let searchParams = null;
        const hotelId = '{{ hotel_id }}';
        let currentImageUrl = null;
        let allHotelImages = [];
        let displayedImageCount = 6;
        let mapInstance = null;
        let currentHotelData = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Get search data from session storage
            const searchParamsStr = sessionStorage.getItem('detailSearchParams') || sessionStorage.getItem('searchData');

            searchParams = searchParamsStr ? JSON.parse(searchParamsStr) : {};

            // Load favorites count
            loadFavoritesCount();

            // Load hotel detail (always RollingGo)
            loadHotelDetail('rollinggo');
        });

        async function loadHotelDetail(provider) {
            try {
                // Build query parameters for RollingGo
                const params = new URLSearchParams();
                params.append('provider', 'rollinggo');

                // RollingGo date parameters
                let checkInDate = searchParams.check_in_date || searchParams.check_in;
                let stayNights = searchParams.stay_nights || 1;

                if (!checkInDate) {
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    checkInDate = tomorrow.toISOString().split('T')[0];
                }

                params.append('check_in_date', checkInDate);

                // 计算 check_out_date
                const checkInDateObj = new Date(checkInDate);
                const checkOutDateObj = new Date(checkInDateObj);
                checkOutDateObj.setDate(checkOutDateObj.getDate() + stayNights);
                params.append('check_out_date', checkOutDateObj.toISOString().split('T')[0]);

                params.append('adult_count', searchParams.adult_count || 2);
                params.append('child_count', searchParams.child_count || 0);

                const url = `/api/hotel/${hotelId}?${params.toString()}`;
                const response = await fetch(url);
                const result = await response.json();

                document.getElementById('loadingPlaceholder').style.display = 'none';

                if (result.success) {
                    currentHotel = result.data;

                    // 从搜索列表缓存中获取图片 URL（详情 API 不返回图片）
                    const hotelListDataStr = sessionStorage.getItem('hotelListData');
                    if (hotelListDataStr && !currentHotel.image_url) {
                        try {
                            const hotelListData = JSON.parse(hotelListDataStr);
                            const cachedData = hotelListData[hotelId];
                            if (cachedData && cachedData.image_url) {
                                currentHotel.image_url = cachedData.image_url;
                                console.log('[Detail] Using cached image_url from search list');
                            }
                        } catch (e) {
                            console.warn('[Detail] Failed to parse hotelListData:', e);
                        }
                    }

                    renderHotelDetail(currentHotel);
                    document.getElementById('hotelContent').style.display = 'block';
                } else {
                    showError(result.error || '加载酒店详情失败');
                }
            } catch (error) {
                document.getElementById('loadingPlaceholder').style.display = 'none';
                showError('网络错误，请检查网络连接后重试');
                console.error('Load hotel detail error:', error);
            }
        }

        function renderHotelDetail(hotel) {
            // Store hotel data globally for room plan rendering
            currentHotelData = hotel;

            // Provider badge is already set in HTML

            // Basic info
            document.getElementById('hotelName').textContent = hotel.name;
            document.getElementById('hotelAddress').textContent = hotel.address || '';

            // Stars
            if (hotel.star_rating) {
                document.getElementById('hotelStars').innerHTML = '★'.repeat(Math.round(hotel.star_rating));
            }

            // Rating
            const ratingBadge = document.getElementById('hotelRating');
            if (hotel.rating) {
                ratingBadge.innerHTML = `<i class="bi bi-star-fill me-1"></i>${hotel.rating.toFixed(1)}`;
                ratingBadge.style.display = 'inline-flex';
            } else {
                ratingBadge.style.display = 'none';
            }

            // Distance
            if (hotel.distance) {
                document.getElementById('hotelDistance').innerHTML = `<i class="bi bi-geo-alt"></i> 距目的地 ${(hotel.distance / 1000).toFixed(1)} km`;
            }

            // Price
            if (hotel.price_per_night) {
                document.getElementById('hotelPrice').textContent = `${hotel.currency || '¥'}${hotel.price_per_night}`;
            } else {
                document.getElementById('hotelPrice').textContent = '暂无报价';
            }

            // Brand info (RollingGo)
            if (hotel.brand) {
                document.getElementById('brandInfo').style.display = 'block';
                document.getElementById('brandName').textContent = hotel.brand;
            }

            // Main image - 只有在有图片时才显示图片区域
            const hasImages = hotel.image_url || (hotel.images && hotel.images.length > 0);
            const imageSection = document.getElementById('imageSection');

            if (hasImages) {
                imageSection.style.display = 'block';
                const mainImageUrl = hotel.image_url || hotel.images?.[0] || '/static/img/placeholder-hotel.png';
                currentImageUrl = mainImageUrl;
                document.getElementById('mainImage').style.backgroundImage = `url('${mainImageUrl}')`;

                // Image gallery - 支持显示更多图片
                allHotelImages = hotel.images || [];
                if (allHotelImages.length > 0) {
                    renderImageGallery();
                }
            }

            // Tags
            if (hotel.tags && hotel.tags.length > 0) {
                const tagsHtml = hotel.tags.map(tag => `<span class="hotel-tag">${tag}</span>`).join('');
                document.getElementById('hotelTags').innerHTML = tagsHtml;
            }

            // Description - 添加展开/收起功能
            if (hotel.description) {
                renderDescription(hotel.description);
                document.getElementById('descriptionSection').style.display = 'block';
            }

            // Map - 使用经纬度初始化地图
            if (hotel.latitude && hotel.longitude) {
                initMap(hotel.latitude, hotel.longitude, hotel.name, hotel.address);
            }

            // Amenities
            if (hotel.amenities && hotel.amenities.length > 0) {
                const amenitiesHtml = hotel.amenities.map(amenity => `
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="amenity-item d-flex align-items-center">
                            <i class="bi bi-check-circle-fill text-success me-2"></i>
                            <span>${amenity}</span>
                        </div>
                    </div>
                `).join('');
                document.getElementById('amenitiesList').innerHTML = amenitiesHtml;
                document.getElementById('amenitiesSection').style.display = 'block';
            }

            // Booking dates - 显示预订日期信息
            if (hotel.check_in && hotel.check_out) {
                document.getElementById('checkInDate').textContent = formatDate(hotel.check_in);
                document.getElementById('checkOutDate').textContent = formatDate(hotel.check_out);
                // 计算入住晚数
                const checkIn = new Date(hotel.check_in);
                const checkOut = new Date(hotel.check_out);
                const nights = Math.round((checkOut - checkIn) / (1000 * 60 * 60 * 24));
                document.getElementById('stayNights').textContent = `${nights} 晚`;
                document.getElementById('bookingDatesSection').style.display = 'block';
            }

            // Room plans - 只展示信息，不需要站内预订按钮
            renderRoomPlans(hotel.room_plans || []);

            // 预订链接按钮 (booking_url from RollingGo)
            const bookingUrlBtn = document.getElementById('bookingUrlBtn');
            if (hotel.booking_url) {
                bookingUrlBtn.href = hotel.booking_url;
                bookingUrlBtn.style.display = 'inline-flex';
            } else {
                bookingUrlBtn.style.display = 'none';
            }

            // Update favorite button
            updateFavoriteButton(hotel.is_favorite);

            // Load price comparison after hotel detail is rendered
            loadPriceComparison();
        }

        // 渲染图片画廊
        function renderImageGallery() {
            const imagesToShow = allHotelImages.slice(0, displayedImageCount);
            const galleryHtml = imagesToShow.map((img, i) => `
                <div class="gallery-thumb ${i === 0 ? 'active' : ''}" style="background-image: url('${img}')" onclick="setMainImage('${img}', this)"></div>
            `).join('');
            document.getElementById('imageGallery').innerHTML = galleryHtml;

            // 显示"查看更多"按钮
            const moreBtn = document.getElementById('moreImagesBtn');
            if (allHotelImages.length > displayedImageCount) {
                document.getElementById('totalImages').textContent = allHotelImages.length - displayedImageCount;
                moreBtn.style.display = 'block';
            } else {
                moreBtn.style.display = 'none';
            }
        }

        // 显示所有图片
        function showAllImages() {
            displayedImageCount = 20; // 最多显示20张
            renderImageGallery();
        }

        // 渲染描述（支持展开/收起）
        function renderDescription(description) {
            const maxLength = 300;
            const descDiv = document.getElementById('hotelDescription');

            if (description.length <= maxLength) {
                descDiv.textContent = description;
            } else {
                const shortDesc = description.substring(0, maxLength);
                descDiv.innerHTML = `
                    <span id="descShort">${shortDesc}...</span>
                    <span id="descFull" style="display: none;">${description}</span>
                    <span class="description-toggle" onclick="toggleDescription()">
                        <i class="bi bi-chevron-down ms-1"></i> 展开全部
                    </span>
                `;
            }
        }

        // 切换描述展开/收起
        function toggleDescription() {
            const shortDesc = document.getElementById('descShort');
            const fullDesc = document.getElementById('descFull');
            const toggle = document.querySelector('.description-toggle');

            if (fullDesc.style.display === 'none') {
                shortDesc.style.display = 'none';
                fullDesc.style.display = 'inline';
                toggle.innerHTML = '<i class="bi bi-chevron-up ms-1"></i> 收起';
            } else {
                shortDesc.style.display = 'inline';
                fullDesc.style.display = 'none';
                toggle.innerHTML = '<i class="bi bi-chevron-down ms-1"></i> 展开全部';
            }
        }

        // 初始化地图
        function initMap(lat, lng, hotelName, address) {
            const mapSection = document.getElementById('mapSection');
            mapSection.style.display = 'block';

            // 初始化地图
            mapInstance = L.map('hotelMap').setView([lat, lng], 15);

            // 使用 OpenStreetMap 免费瓦片
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(mapInstance);

            // 添加标记点
            L.marker([lat, lng]).addTo(mapInstance)
                .bindPopup(`<strong>${hotelName}</strong><br>${address || ''}`);

            // 显示地址
            document.getElementById('mapAddress').innerHTML = `<i class="bi bi-geo-alt me-1"></i>${address || ''}`;
        }

        // 图片灯箱
        function openLightbox(imageUrl) {
            const lightbox = document.createElement('div');
            lightbox.className = 'image-lightbox';
            lightbox.innerHTML = `
                <img src="${imageUrl}" style="max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
                <button class="btn btn-light position-absolute top-0 end-0 m-3" onclick="this.parentElement.remove()">
                    <i class="bi bi-x-lg"></i>
                </button>
                <div class="lightbox-nav position-absolute top-50 start-0 translate-middle-y ms-3">
                    <button class="btn btn-light btn-lg rounded-circle" onclick="navigateLightbox(-1)">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                </div>
                <div class="lightbox-nav position-absolute top-50 end-0 translate-middle-y me-3">
                    <button class="btn btn-light btn-lg rounded-circle" onclick="navigateLightbox(1)">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            `;
            lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.remove(); };
            document.body.appendChild(lightbox);
            currentImageUrl = imageUrl;
        }

        // 灯箱图片导航
        function navigateLightbox(direction) {
            const currentIndex = allHotelImages.indexOf(currentImageUrl);
            let newIndex = currentIndex + direction;

            if (newIndex < 0) newIndex = allHotelImages.length - 1;
            if (newIndex >= allHotelImages.length) newIndex = 0;

            const newUrl = allHotelImages[newIndex];
            document.querySelector('.image-lightbox img').src = newUrl;
            currentImageUrl = newUrl;
        }

        function renderRoomPlans(roomPlans) {
            const container = document.getElementById('roomPlansList');

            if (!roomPlans || roomPlans.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-4">
                        <i class="bi bi-calendar-x display-4 text-muted"></i>
                        <p class="text-muted mt-2">暂无可预订房型</p>
                    </div>
                `;
                return;
            }

            const html = roomPlans.map((plan, index) => {
                // 床型标签
                const bedTypeBadge = plan.bed_type ? `
                    <span class="badge bg-light text-dark border me-2">
                        <i class="bi bi-bed me-1"></i>${plan.bed_type}
                    </span>
                ` : '';

                // 取消政策
                const cancellationInfo = plan.cancellation ? `
                    <div class="text-muted small mt-2">
                        <i class="bi bi-info-circle me-1"></i>${plan.cancellation}
                    </div>
                ` : '';

                // 检查是否有有效价格（大于0）
                const hasPrice = (plan.price_per_night && plan.price_per_night > 0) ||
                                 (plan.price && plan.price > 0) ||
                                 (plan.total_price && plan.total_price > 0);
                const displayPrice = plan.price_per_night > 0 ? plan.price_per_night :
                                    plan.price > 0 ? plan.price : 0;

                // 总价显示 - 只在有有效价格时显示
                const totalPriceHtml = (plan.total_price && plan.total_price > 0) ? `
                    <div class="text-muted small">
                        总价: ${plan.currency || '¥'}${plan.total_price}
                    </div>
                ` : '';

                // 预订链接按钮（无价格时显示）
                const bookingBtnHtml = (!hasPrice && currentHotelData && currentHotelData.booking_url) ? `
                    <a href="${currentHotelData.booking_url}" target="_blank" class="btn btn-outline-primary btn-sm mt-2">
                        <i class="bi bi-box-arrow-up-right me-1"></i> 查看实时价格
                    </a>
                ` : '';

                return `
                    <div class="room-plan-card mb-3" style="animation-delay: ${index * 0.1}s;">
                        <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center p-4">
                            <div class="flex-grow-1 mb-3 mb-md-0">
                                <h6 class="mb-2 fw-bold">${plan.name || '标准房型'}</h6>
                                <div class="mb-2">
                                    ${bedTypeBadge}
                                </div>
                                <p class="text-muted small mb-2">${plan.description || ''}</p>
                                ${plan.amenities && plan.amenities.length > 0 ? `
                                    <div class="d-flex flex-wrap gap-2">
                                        ${plan.amenities.slice(0, 3).map(a => `<span class="badge bg-light text-dark border">${a}</span>`).join('')}
                                        ${plan.amenities.length > 3 ? `<span class="badge bg-light text-muted">+${plan.amenities.length - 3}</span>` : ''}
                                    </div>
                                ` : ''}
                                ${cancellationInfo}
                            </div>
                            <div class="text-md-end ms-md-4">
                                ${plan.available ? `
                                    <div class="mb-2">
                                        ${hasPrice ? `
                                            <span class="fs-4 fw-bold text-primary" style="font-family: var(--font-number);">${plan.currency || '¥'}${displayPrice}</span>
                                            <span class="text-muted small">/晚</span>
                                        ` : `
                                            <span class="text-muted small">暂无报价</span>
                                        `}
                                    </div>
                                    ${totalPriceHtml}
                                    ${bookingBtnHtml}
                                    ${hasPrice ? `<span class="badge bg-light text-muted">请使用上方预订按钮</span>` : ''}
                                ` : `
                                    <div class="text-center">
                                        <span class="badge bg-danger bg-opacity-10 text-danger">
                                            <i class="bi bi-x-circle me-1"></i> 满房
                                        </span>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        // 格式化日期为友好格式 (YYYY-MM-DD -> MM月DD日 周X)
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[date.getDay()];
            return `${month}月${day}日 ${weekDay}`;
        }

        function setMainImage(url, thumbElement) {
            currentImageUrl = url;
            document.getElementById('mainImage').style.backgroundImage = `url('${url}')`;
            // Update active thumbnail
            document.querySelectorAll('.gallery-thumb').forEach(thumb => thumb.classList.remove('active'));
            if (thumbElement) {
                thumbElement.classList.add('active');
            }
        }

        function updateFavoriteButton(isFavorite) {
            const btn = document.getElementById('favoriteBtn');
            const icon = btn.querySelector('i');
            const text = btn.querySelector('span');

            if (isFavorite) {
                icon.className = 'bi bi-heart-fill';
                text.textContent = '已收藏';
                btn.classList.add('active');
            } else {
                icon.className = 'bi bi-heart';
                text.textContent = '收藏';
                btn.classList.remove('active');
            }
        }

        async function toggleFavorite() {
            if (!currentHotel) return;

            try {
                const response = await fetch('/api/favorites/toggle', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        hotel_id: currentHotel.hotel_id,
                        hotel_data: currentHotel
                    })
                });

                const result = await response.json();

                if (result.success) {
                    currentHotel.is_favorite = result.data.is_favorite;
                    updateFavoriteButton(result.data.is_favorite);
                    loadFavoritesCount();
                }
            } catch (error) {
                console.error('Toggle favorite error:', error);
            }
        }

        function shareHotel() {
            const url = window.location.href;
            const title = currentHotel ? currentHotel.name : '酒店详情';

            if (navigator.share) {
                navigator.share({
                    title: title,
                    url: url
                }).catch(() => {});
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(url).then(() => {
                    alert('链接已复制到剪贴板');
                });
            }
        }

        function goBack() {
            if (document.referrer.includes('/results')) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorText').textContent = message;
        }

        // ==================== Price Comparison Functions ====================

        // Currency symbol mapping for proper display
        const CURRENCY_SYMBOLS = {
            'CNY': '¥',
            'USD': '$',
            'EUR': '€',
            'GBP': '£',
            'HKD': 'HK$',
            'TWD': 'NT$'
        };

        function getCurrencySymbol(currency) {
            // If currency is already a symbol, return it
            if (!currency || currency.length <= 3) {
                return currency || '¥';
            }
            // Otherwise look up in mapping
            return CURRENCY_SYMBOLS[currency] || '¥';
        }

        async function loadPriceComparison() {
            if (!currentHotel || !searchParams) {
                console.log('Skipping comparison: no hotel or search params');
                return;
            }

            const loading = document.getElementById('comparisonLoading');
            const results = document.getElementById('comparisonResults');
            const errorDiv = document.getElementById('comparisonError');
            const noResults = document.getElementById('comparisonNoResults');

            // Reset states
            loading.style.display = 'block';
            results.style.display = 'none';
            errorDiv.style.display = 'none';
            noResults.style.display = 'none';

            try {
                // Build comparison params
                const params = new URLSearchParams();
                params.append('provider', currentHotel.provider || 'rollinggo');
                params.append('hotel_id', currentHotel.hotel_id);

                // Date params
                const checkIn = currentHotel.check_in || searchParams.check_in || searchParams.check_in_date;
                const checkOut = currentHotel.check_out || searchParams.check_out || searchParams.check_out_date;
                params.append('check_in', checkIn);
                params.append('check_out', checkOut);

                // Hotel info for matching
                if (currentHotel.name) params.append('hotel_name', currentHotel.name);
                if (currentHotel.address) params.append('hotel_address', currentHotel.address);
                if (currentHotel.latitude) params.append('hotel_lat', currentHotel.latitude);
                if (currentHotel.longitude) params.append('hotel_lng', currentHotel.longitude);
                params.append('adult_count', searchParams.adult_count || 2);
                params.append('child_count', searchParams.child_count || 0);

                const response = await fetch(`/api/compare/${currentHotel.provider || 'rollinggo'}/${currentHotel.hotel_id}?${params.toString()}`);
                const result = await response.json();

                loading.style.display = 'none';

                if (result.success) {
                    renderComparisonResults(result.data);
                } else {
                    showComparisonError(result.error || '比价查询失败');
                }

            } catch (error) {
                loading.style.display = 'none';
                showComparisonError('网络错误，无法获取比价信息');
                console.error('Load price comparison error:', error);
            }
        }

        function renderComparisonResults(data) {
            const results = document.getElementById('comparisonResults');
            const noResults = document.getElementById('comparisonNoResults');
            const tableBody = document.getElementById('comparisonTableBody');
            const bestPriceBanner = document.getElementById('bestPriceBanner');
            const matchInfo = document.getElementById('matchInfo');

            // Check if we have any comparison data (including external prices)
            const hasComparisons = data.comparisons && data.comparisons.length > 0;
            const hasSourcePrice = data.source && data.source.price;
            const hasExternalPrices = data.external_prices && data.external_prices.length > 0;

            if (!hasComparisons && !hasSourcePrice && !hasExternalPrices) {
                noResults.style.display = 'block';
                return;
            }

            // Clear table
            tableBody.innerHTML = '';

            // Build rows for all providers
            const allProviders = [data.source, ...(data.comparisons || [])];
            const providerNames = {
                'rollinggo': 'RollingGo',
                'tuniu': '途牛'
            };

            allProviders.forEach((item, index) => {
                const isSource = index === 0;
                const isBest = data.best_price && data.best_price.provider === item.provider;
                const row = document.createElement('tr');

                // Highlight best price
                if (isBest) {
                    row.className = 'table-success';
                }

                // Platform name
                const platformCell = document.createElement('td');
                platformCell.innerHTML = `
                    <div class="d-flex align-items-center">
                        <span class="badge ${isSource ? 'bg-info' : 'bg-secondary'} me-2">
                            ${providerNames[item.provider] || item.provider}
                        </span>
                        ${isSource ? '<span class="badge bg-light text-dark border">当前</span>' : ''}
                        ${isBest ? '<i class="bi bi-trophy-fill text-warning ms-2" title="最低价"></i>' : ''}
                    </div>
                `;
                row.appendChild(platformCell);

                // Price
                const priceCell = document.createElement('td');
                if (item.price) {
                    priceCell.innerHTML = `
                        <div>
                            <span class="fs-5 fw-bold ${isBest ? 'text-success' : 'text-primary'}">${item.currency || '¥'}${item.price}</span>
                            <span class="text-muted small">/晚</span>
                        </div>
                    `;
                } else {
                    priceCell.innerHTML = '<span class="text-muted">暂无报价</span>';
                }
                row.appendChild(priceCell);

                // Action
                const actionCell = document.createElement('td');
                if (item.url) {
                    actionCell.innerHTML = `
                        <a href="${item.url}" target="_blank" class="btn btn-sm ${isBest ? 'btn-success' : 'btn-outline-primary'}">
                            <i class="bi bi-box-arrow-up-right me-1"></i> 前往预订
                        </a>
                    `;
                } else if (item.provider === 'tuniu' && item.supports_booking) {
                    actionCell.innerHTML = `
                        <span class="text-muted small">支持站内预订</span>
                    `;
                } else {
                    actionCell.innerHTML = '<span class="text-muted small">-</span>';
                }
                row.appendChild(actionCell);

                tableBody.appendChild(row);
            });

            // Show best price banner
            if (data.best_price && data.best_price.save && data.best_price.save > 0) {
                bestPriceBanner.style.display = 'flex';
                document.getElementById('bestPriceText').textContent =
                    `在 ${providerNames[data.best_price.provider]} 找到最低价，可节省 ¥${data.best_price.save}`;
            } else {
                bestPriceBanner.style.display = 'none';
            }

            // Show match info for cross-platform matches
            if (hasComparisons) {
                const comparison = data.comparisons[0];
                if (comparison.match_confidence) {
                    matchInfo.style.display = 'block';
                    const confidencePercent = Math.round(comparison.match_confidence * 100);
                    let matchType = '名称匹配';
                    if (comparison.location_match) {
                        matchType = '名称+位置匹配';
                    }
                    document.getElementById('matchInfoText').textContent =
                        `${matchType}，置信度 ${confidencePercent}%`;
                }
            }

            // Render external platform prices (Serper)
            renderExternalPrices(data.external_prices);

            results.style.display = 'block';
        }

        function renderExternalPrices(externalPrices) {
            const tbody = document.getElementById('externalPricesBody');
            if (!tbody) return;

            // Clear previous content
            tbody.innerHTML = '';

            if (!externalPrices || externalPrices.length === 0) {
                return;
            }

            // Add section header
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = `
                <td colspan="3" class="table-secondary">
                    <small class="text-muted">
                        <i class="bi bi-globe me-1"></i>外部平台参考价格 (需跳转确认实时价格)
                    </small>
                </td>
            `;
            tbody.appendChild(headerRow);

            // Add external price rows
            externalPrices.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'external-price-row';

                // Platform name with icon
                const platformCell = document.createElement('td');
                const iconClass = item.icon || 'bi-link';
                platformCell.innerHTML = `
                    <div class="d-flex align-items-center">
                        <i class="bi ${iconClass} me-2 text-info"></i>
                        <span class="badge bg-info bg-opacity-10 text-info">${item.platform_name}</span>
                    </div>
                `;
                row.appendChild(platformCell);

                // Price - use proper currency symbol
                const priceCell = document.createElement('td');
                const currencySymbol = getCurrencySymbol(item.currency);
                if (item.price) {
                    priceCell.innerHTML = `
                        <div>
                            <span class="fs-6 fw-bold text-primary">${currencySymbol}${item.price}</span>
                            <span class="text-muted small">/晚</span>
                            <span class="badge bg-light text-muted ms-1">参考</span>
                        </div>
                    `;
                } else {
                    priceCell.innerHTML = '<span class="text-muted small">查看详情</span>';
                }
                row.appendChild(priceCell);

                // Action button
                const actionCell = document.createElement('td');
                if (item.url) {
                    actionCell.innerHTML = `
                        <a href="${item.url}" target="_blank" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-box-arrow-up-right me-1"></i> 前往查看
                        </a>
                    `;
                } else {
                    actionCell.innerHTML = '<span class="text-muted small">-</span>';
                }
                row.appendChild(actionCell);

                tbody.appendChild(row);
            });
        }

        function showComparisonError(message) {
            document.getElementById('comparisonErrorText').textContent = message;
            document.getElementById('comparisonError').style.display = 'block';
        }
    </script>

    <style>
        /* Room plan card enhancements */
        .room-plan-card {
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            background: white;
            transition: all var(--transition-fast);
        }

        .room-plan-card:hover {
            border-color: var(--primary-300);
            background: var(--primary-50);
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }

        /* Map container */
        #hotelMap {
            background: var(--gray-100);
            border-radius: var(--radius-lg);
            z-index: 1;
        }

        /* Description toggle */
        .description-toggle {
            cursor: pointer;
            color: var(--primary-500);
            font-size: var(--text-sm);
            font-weight: 500;
            white-space: nowrap;
        }

        .description-toggle:hover {
            color: var(--primary-600);
        }

        /* Image lightbox */
        .image-lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lightbox-nav button {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main image cursor */
        #mainImage {
            cursor: zoom-in;
        }

        /* Gallery thumb hover */
        .gallery-thumb {
            cursor: pointer;
        }

        /* More images button */
        #moreImagesBtn button {
            transition: all var(--transition-fast);
        }

        #moreImagesBtn button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Price Comparison Section */
        #priceComparisonSection .table th {
            font-weight: 500;
            border-bottom-width: 1px;
        }

        #priceComparisonSection .table td {
            vertical-align: middle;
        }

        #bestPriceBanner {
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table-success {
            background-color: rgba(25, 135, 84, 0.1) !important;
        }

        #refreshComparison {
            transition: all var(--transition-fast);
        }

        #refreshComparison:hover {
            transform: rotate(180deg);
        }

        #refreshComparison:active {
            transform: rotate(360deg);
        }
    </style>
</body>
</html>
