<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店详情 - 酒店搜索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-building"></i> 酒店搜索
            </a>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm me-2" onclick="goBack()">
                    <i class="bi bi-arrow-left"></i> 返回
                </button>
                <a class="nav-link text-white" href="#" id="favoritesLink">
                    <i class="bi bi-heart"></i> 收藏
                    <span class="badge bg-danger" id="favoritesCount">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <!-- Loading Placeholder -->
        <div id="loadingPlaceholder" class="text-center py-5">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 text-muted">加载酒店详情...</p>
        </div>

        <!-- Hotel Detail Content -->
        <div id="hotelContent" style="display: none;">
            <!-- Provider Badge -->
            <div class="mb-3 page-enter">
                <span class="badge" id="providerBadge"></span>
                <span class="badge bg-success" id="bookingBadge" style="display: none;">
                    <i class="bi bi-check-circle"></i> 支持预订
                </span>
            </div>

            <!-- Header Section -->
            <div class="hotel-header mb-4">
                <div class="row align-items-center">
                    <div class="col-lg-8">
                        <h2 id="hotelName" class="mb-2 fw-bold"></h2>
                        <p id="hotelAddress" class="text-muted mb-3"></p>
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <span id="hotelStars" class="star-rating"></span>
                            <span id="hotelRating" class="rating-badge" style="display: none;"></span>
                            <span id="hotelDistance" class="text-muted"></span>
                        </div>
                        <!-- Tuniu specific info -->
                        <div id="tuniuInfo" class="mt-2" style="display: none;">
                            <span id="brandName" class="badge bg-light text-dark me-1"></span>
                            <small id="businessArea" class="text-muted"></small>
                        </div>
                    </div>
                    <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
                        <div class="price-section">
                            <span class="text-muted small">起</span>
                            <span id="hotelPrice" class="display-5 text-primary fw-bold" style="font-family: var(--font-number);"></span>
                            <span class="text-muted">/晚</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Image Gallery -->
            <div class="row mb-4">
                <div class="col-12">
                    <div id="mainImage" class="hotel-main-image"></div>
                    <div id="imageGallery" class="image-gallery mt-3"></div>
                </div>
            </div>

            <!-- Tags -->
            <div id="hotelTags" class="mb-4"></div>

            <!-- Description -->
            <div id="descriptionSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-info-circle text-primary me-2"></i> 酒店介绍
                    </h5>
                    <p id="hotelDescription" class="text-muted mb-0"></p>
                </div>
            </div>

            <!-- Amenities -->
            <div id="amenitiesSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-check2-circle text-primary me-2"></i> 酒店设施
                    </h5>
                    <div id="amenitiesList" class="row g-3"></div>
                </div>
            </div>

            <!-- Room Plans -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-door-open text-primary me-2"></i> 可用房型
                    </h5>
                    <div id="roomPlansList">
                        <div class="text-center py-3 text-muted">
                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                            加载房型信息...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-3 mb-4 flex-wrap">
                <!-- 预订链接按钮 (booking_url) -->
                <a id="bookingUrlBtn" class="btn btn-primary btn-lg" style="display: none;" target="_blank">
                    <i class="bi bi-box-arrow-up-right me-2"></i> 立即预订
                </a>
                <button id="favoriteBtn" class="btn btn-outline-danger" onclick="toggleFavorite()">
                    <i class="bi bi-heart me-2"></i> <span>收藏</span>
                </button>
                <button class="btn btn-outline-primary" onclick="shareHotel()">
                    <i class="bi bi-share me-2"></i> 分享
                </button>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-danger" style="display: none;">
            <i class="bi bi-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center text-muted">
            <p id="footerText">本站提供酒店搜索与预订服务</p>
        </div>
    </footer>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">加载中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Global variables
        let currentHotel = null;
        let searchParams = null;
        const hotelId = '{{ hotel_id }}';

        document.addEventListener('DOMContentLoaded', function() {
            // Get search data from session storage
            const searchParamsStr = sessionStorage.getItem('detailSearchParams') || sessionStorage.getItem('searchData');
            const providerStr = sessionStorage.getItem('currentProvider');

            searchParams = searchParamsStr ? JSON.parse(searchParamsStr) : {};
            const provider = providerStr || searchParams.provider || 'tuniu';

            // Load favorites count
            loadFavoritesCount();

            // Load hotel detail
            loadHotelDetail(provider);
        });

        async function loadHotelDetail(provider) {
            try {
                // Build query parameters based on provider
                const params = new URLSearchParams();
                params.append('provider', provider);

                if (provider === 'tuniu') {
                    // Tuniu requires check_in and check_out
                    const checkIn = searchParams.check_in || searchParams.check_in_date;
                    const checkOut = searchParams.check_out || searchParams.check_out_date;

                    if (!checkIn || !checkOut) {
                        // Use default dates if not provided
                        const tomorrow = new Date();
                        tomorrow.setDate(tomorrow.getDate() + 1);
                        const dayAfter = new Date(tomorrow);
                        dayAfter.setDate(dayAfter.getDate() + 1);

                        params.append('check_in', checkIn || tomorrow.toISOString().split('T')[0]);
                        params.append('check_out', checkOut || dayAfter.toISOString().split('T')[0]);
                    } else {
                        params.append('check_in', checkIn);
                        params.append('check_out', checkOut);
                    }

                    params.append('adult_count', searchParams.adult_count || 2);
                    params.append('child_count', searchParams.child_count || 0);
                } else {
                    // RollingGo
                    // 如果没有日期，使用默认日期（明天和后天）
                    let checkInDate = searchParams.check_in_date || searchParams.check_in;
                    let stayNights = searchParams.stay_nights || 1;

                    if (!checkInDate) {
                        const tomorrow = new Date();
                        tomorrow.setDate(tomorrow.getDate() + 1);
                        checkInDate = tomorrow.toISOString().split('T')[0];
                    }

                    params.append('check_in_date', checkInDate);

                    // 计算 check_out_date
                    const checkInDateObj = new Date(checkInDate);
                    const checkOutDateObj = new Date(checkInDateObj);
                    checkOutDateObj.setDate(checkOutDateObj.getDate() + stayNights);
                    params.append('check_out_date', checkOutDateObj.toISOString().split('T')[0]);

                    params.append('adult_count', searchParams.adult_count || 2);
                    params.append('child_count', searchParams.child_count || 0);
                }

                const url = `/api/hotel/${hotelId}?${params.toString()}`;
                const response = await fetch(url);
                const result = await response.json();

                document.getElementById('loadingPlaceholder').style.display = 'none';

                if (result.success) {
                    currentHotel = result.data;
                    renderHotelDetail(currentHotel);
                    document.getElementById('hotelContent').style.display = 'block';
                } else {
                    showError(result.error || '加载酒店详情失败');
                }
            } catch (error) {
                document.getElementById('loadingPlaceholder').style.display = 'none';
                showError('网络错误，请检查网络连接后重试');
                console.error('Load hotel detail error:', error);
            }
        }

        function renderHotelDetail(hotel) {
            // Provider info
            const provider = hotel.provider || 'rollinggo';
            const providerBadge = document.getElementById('providerBadge');
            const bookingBadge = document.getElementById('bookingBadge');

            if (provider === 'tuniu') {
                providerBadge.textContent = '途牛 MCP';
                providerBadge.className = 'badge bg-success';
            } else {
                providerBadge.textContent = 'RollingGo';
                providerBadge.className = 'badge bg-info';
            }

            if (hotel.supports_booking) {
                bookingBadge.style.display = 'inline-block';
            }

            // Basic info
            document.getElementById('hotelName').textContent = hotel.name;
            document.getElementById('hotelAddress').textContent = hotel.address || '';

            // Stars
            if (hotel.star_rating) {
                document.getElementById('hotelStars').innerHTML = '★'.repeat(Math.round(hotel.star_rating));
            }

            // Rating
            const ratingBadge = document.getElementById('hotelRating');
            if (hotel.rating) {
                ratingBadge.innerHTML = `<i class="bi bi-star-fill me-1"></i>${hotel.rating.toFixed(1)}`;
                ratingBadge.style.display = 'inline-flex';
            } else {
                ratingBadge.style.display = 'none';
            }

            // Distance
            if (hotel.distance) {
                document.getElementById('hotelDistance').innerHTML = `<i class="bi bi-geo-alt"></i> 距目的地 ${(hotel.distance / 1000).toFixed(1)} km`;
            }

            // Price
            if (hotel.price_per_night) {
                document.getElementById('hotelPrice').textContent = `${hotel.currency || '¥'}${hotel.price_per_night}`;
            } else {
                document.getElementById('hotelPrice').textContent = '暂无报价';
            }

            // Main image
            const mainImageUrl = hotel.image_url || hotel.images?.[0] || '/static/img/placeholder-hotel.png';
            document.getElementById('mainImage').style.backgroundImage = `url('${mainImageUrl}')`;

            // Image gallery
            if (hotel.images && hotel.images.length > 0) {
                const galleryHtml = hotel.images.slice(0, 6).map((img, i) => `
                    <div class="gallery-thumb ${i === 0 ? 'active' : ''}" style="background-image: url('${img}')" onclick="setMainImage('${img}', this)"></div>
                `).join('');
                document.getElementById('imageGallery').innerHTML = galleryHtml;
            }

            // Tags
            if (hotel.tags && hotel.tags.length > 0) {
                const tagsHtml = hotel.tags.map(tag => `<span class="hotel-tag">${tag}</span>`).join('');
                document.getElementById('hotelTags').innerHTML = tagsHtml;
            }

            // Description
            if (hotel.description) {
                document.getElementById('hotelDescription').textContent = hotel.description;
                document.getElementById('descriptionSection').style.display = 'block';
            }

            // Amenities
            if (hotel.amenities && hotel.amenities.length > 0) {
                const amenitiesHtml = hotel.amenities.map(amenity => `
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="amenity-item d-flex align-items-center">
                            <i class="bi bi-check-circle-fill text-success me-2"></i>
                            <span>${amenity}</span>
                        </div>
                    </div>
                `).join('');
                document.getElementById('amenitiesList').innerHTML = amenitiesHtml;
                document.getElementById('amenitiesSection').style.display = 'block';
            }

            // Tuniu specific info
            if (provider === 'tuniu') {
                document.getElementById('tuniuInfo').style.display = 'block';
                if (hotel.brand_name) {
                    document.getElementById('brandName').textContent = hotel.brand_name;
                }
                if (hotel.business) {
                    document.getElementById('businessArea').innerHTML = `<i class="bi bi-geo"></i> ${hotel.business}`;
                }
            }

            // Room plans
            renderRoomPlans(hotel.room_plans || [], hotel.supports_booking, provider);

            // 预订链接按钮 (booking_url from MCP API)
            const bookingUrlBtn = document.getElementById('bookingUrlBtn');
            if (hotel.booking_url) {
                bookingUrlBtn.href = hotel.booking_url;
                bookingUrlBtn.style.display = 'inline-flex';
            } else {
                bookingUrlBtn.style.display = 'none';
            }

            // Update favorite button
            updateFavoriteButton(hotel.is_favorite);

            // Update footer
            if (hotel.supports_booking) {
                document.getElementById('footerText').textContent = '本站提供酒店搜索与预订服务';
            } else {
                document.getElementById('footerText').textContent = '本站仅提供酒店搜索与比价服务，不支持直接预订';
            }
        }

        function renderRoomPlans(roomPlans, supportsBooking, provider) {
            const container = document.getElementById('roomPlansList');

            if (!roomPlans || roomPlans.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-4">
                        <i class="bi bi-calendar-x display-4 text-muted"></i>
                        <p class="text-muted mt-2">暂无可预订房型</p>
                    </div>
                `;
                return;
            }

            const html = roomPlans.map((plan, index) => `
                <div class="room-plan-card mb-3" style="animation-delay: ${index * 0.1}s;">
                    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center p-4">
                        <div class="flex-grow-1 mb-3 mb-md-0">
                            <h6 class="mb-2 fw-bold">${plan.name || '标准房型'}</h6>
                            <p class="text-muted small mb-2">${plan.description || ''}</p>
                            ${plan.amenities && plan.amenities.length > 0 ? `
                                <div class="d-flex flex-wrap gap-2">
                                    ${plan.amenities.slice(0, 3).map(a => `<span class="badge bg-light text-dark border">${a}</span>`).join('')}
                                    ${plan.amenities.length > 3 ? `<span class="badge bg-light text-muted">+${plan.amenities.length - 3}</span>` : ''}
                                </div>
                            ` : ''}
                        </div>
                        <div class="text-md-end ms-md-4">
                            ${plan.available ? `
                                <div class="mb-2">
                                    <span class="fs-4 fw-bold text-primary" style="font-family: var(--font-number);">${plan.currency || '¥'}${plan.price || '询价'}</span>
                                    <span class="text-muted small">/晚</span>
                                </div>
                                ${supportsBooking && provider === 'tuniu' ? `
                                    <button class="btn btn-success btn-sm" onclick="goToBooking('${plan.room_id || ''}', ${JSON.stringify(plan).replace(/"/g, '&quot;')})">
                                        <i class="bi bi-cart-check me-1"></i> 立即预订
                                    </button>
                                ` : `
                                    <span class="badge bg-light text-muted">仅查看</span>
                                `}
                            ` : `
                                <div class="text-center">
                                    <span class="badge bg-danger bg-opacity-10 text-danger">
                                        <i class="bi bi-x-circle me-1"></i> 满房
                                    </span>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        function goToBooking(roomId, roomPlan) {
            if (!currentHotel) return;

            // Build booking data
            const provider = currentHotel.provider || 'tuniu';
            let checkIn, checkOut, adultCount, childCount;

            if (provider === 'tuniu') {
                checkIn = searchParams.check_in || searchParams.check_in_date;
                checkOut = searchParams.check_out || searchParams.check_out_date;
                adultCount = searchParams.adult_count || 2;
                childCount = searchParams.child_count || 0;
            } else {
                checkIn = searchParams.check_in_date;
                if (searchParams.stay_nights && searchParams.check_in_date) {
                    const checkOutDate = new Date(searchParams.check_in_date);
                    checkOutDate.setDate(checkOutDate.getDate() + searchParams.stay_nights);
                    checkOut = checkOutDate.toISOString().split('T')[0];
                }
                adultCount = searchParams.adult_count || 2;
                childCount = searchParams.child_count || 0;
            }

            // Calculate nights
            const checkInDate = new Date(checkIn);
            const checkOutDate = new Date(checkOut);
            const nights = Math.round((checkOutDate - checkInDate) / (1000 * 60 * 60 * 24));

            const bookingData = {
                provider: provider,
                hotel: {
                    hotel_id: currentHotel.hotel_id,
                    name: currentHotel.name,
                    address: currentHotel.address,
                    image_url: currentHotel.image_url,
                    pre_book_param: currentHotel.pre_book_param
                },
                selected_room: roomPlan,
                check_in: checkIn,
                check_out: checkOut,
                nights: nights,
                adult_count: adultCount,
                child_count: childCount,
                room_count: 1
            };

            // Store booking data and redirect
            sessionStorage.setItem('bookingData', JSON.stringify(bookingData));
            window.location.href = '/booking';
        }

        function setMainImage(url, thumbElement) {
            document.getElementById('mainImage').style.backgroundImage = `url('${url}')`;
            // Update active thumbnail
            document.querySelectorAll('.gallery-thumb').forEach(thumb => thumb.classList.remove('active'));
            if (thumbElement) {
                thumbElement.classList.add('active');
            }
        }

        function updateFavoriteButton(isFavorite) {
            const btn = document.getElementById('favoriteBtn');
            const icon = btn.querySelector('i');
            const text = btn.querySelector('span');

            if (isFavorite) {
                icon.className = 'bi bi-heart-fill';
                text.textContent = '已收藏';
                btn.classList.add('active');
            } else {
                icon.className = 'bi bi-heart';
                text.textContent = '收藏';
                btn.classList.remove('active');
            }
        }

        async function toggleFavorite() {
            if (!currentHotel) return;

            try {
                const response = await fetch('/api/favorites/toggle', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        hotel_id: currentHotel.hotel_id,
                        hotel_data: currentHotel
                    })
                });

                const result = await response.json();

                if (result.success) {
                    currentHotel.is_favorite = result.data.is_favorite;
                    updateFavoriteButton(result.data.is_favorite);
                    loadFavoritesCount();
                }
            } catch (error) {
                console.error('Toggle favorite error:', error);
            }
        }

        function shareHotel() {
            const url = window.location.href;
            const title = currentHotel ? currentHotel.name : '酒店详情';

            if (navigator.share) {
                navigator.share({
                    title: title,
                    url: url
                }).catch(() => {});
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(url).then(() => {
                    alert('链接已复制到剪贴板');
                });
            }
        }

        function goBack() {
            if (document.referrer.includes('/results')) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorText').textContent = message;
        }
    </script>

    <style>
        /* Room plan card enhancements */
        .room-plan-card {
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            background: white;
            transition: all var(--transition-fast);
        }

        .room-plan-card:hover {
            border-color: var(--primary-300);
            background: var(--primary-50);
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }
    </style>
</body>
</html>
