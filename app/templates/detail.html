<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店详情 - 酒店搜索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-building"></i> 酒店搜索
            </a>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm me-2" onclick="goBack()">
                    <i class="bi bi-arrow-left"></i> 返回
                </button>
                <a class="nav-link text-white" href="#" id="favoritesLink">
                    <i class="bi bi-heart"></i> 收藏
                    <span class="badge bg-danger" id="favoritesCount">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <!-- Loading Placeholder -->
        <div id="loadingPlaceholder" class="text-center py-5">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 text-muted">加载酒店详情...</p>
        </div>

        <!-- Hotel Detail Content -->
        <div id="hotelContent" style="display: none;">
            <!-- Provider Badge -->
            <div class="mb-3 page-enter">
                <span class="badge bg-info" id="providerBadge">
                    <i class="bi bi-globe2 me-1"></i> RollingGo
                </span>
            </div>

            <!-- Header Section -->
            <div class="hotel-header mb-4">
                <div class="row align-items-center">
                    <div class="col-lg-8">
                        <h2 id="hotelName" class="mb-2 fw-bold"></h2>
                        <p id="hotelAddress" class="text-muted mb-3"></p>
                        <div class="d-flex align-items-center gap-3 flex-wrap">
                            <span id="hotelStars" class="star-rating"></span>
                            <span id="hotelRating" class="rating-badge" style="display: none;"></span>
                            <span id="hotelDistance" class="text-muted"></span>
                        </div>
                        <!-- Brand info -->
                        <div id="brandInfo" class="mt-2" style="display: none;">
                            <span id="brandName" class="badge bg-light text-dark border"></span>
                        </div>
                    </div>
                    <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
                        <div class="price-section">
                            <span class="text-muted small">起</span>
                            <span id="hotelPrice" class="display-5 text-primary fw-bold" style="font-family: var(--font-number);"></span>
                            <span class="text-muted">/晚</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Image Gallery -->
            <div class="row mb-4">
                <div class="col-12">
                    <div id="mainImage" class="hotel-main-image" onclick="openLightbox(currentImageUrl)"></div>
                    <div id="imageGallery" class="image-gallery mt-3"></div>
                    <div id="moreImagesBtn" class="text-center mt-2" style="display: none;">
                        <button class="btn btn-outline-primary btn-sm" onclick="showAllImages()">
                            <i class="bi bi-images me-1"></i> 查看更多图片 (<span id="totalImages">0</span>张)
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tags -->
            <div id="hotelTags" class="mb-4"></div>

            <!-- Description -->
            <div id="descriptionSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-info-circle text-primary me-2"></i> 酒店介绍
                    </h5>
                    <div id="hotelDescription" class="text-muted mb-0"></div>
                </div>
            </div>

            <!-- Location Map -->
            <div id="mapSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title mb-3">
                        <i class="bi bi-geo-alt text-primary me-2"></i> 酒店位置
                    </h5>
                    <div id="hotelMap" style="height: 300px; border-radius: var(--radius-lg);"></div>
                    <p id="mapAddress" class="text-muted small mt-2"></p>
                </div>
            </div>

            <!-- Amenities -->
            <div id="amenitiesSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-check2-circle text-primary me-2"></i> 酒店设施
                    </h5>
                    <div id="amenitiesList" class="row g-3"></div>
                </div>
            </div>

            <!-- Booking Dates -->
            <div id="bookingDatesSection" class="card mb-4" style="display: none;">
                <div class="card-body">
                    <h5 class="card-title mb-3">
                        <i class="bi bi-calendar-check text-primary me-2"></i> 预订日期
                    </h5>
                    <div class="d-flex align-items-center gap-4">
                        <div>
                            <span class="text-muted small">入住</span>
                            <div id="checkInDate" class="fw-bold"></div>
                        </div>
                        <i class="bi bi-arrow-right text-muted"></i>
                        <div>
                            <span class="text-muted small">退房</span>
                            <div id="checkOutDate" class="fw-bold"></div>
                        </div>
                        <div class="ms-auto">
                            <span class="badge bg-primary bg-opacity-10 text-primary" id="stayNights"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Room Plans -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-door-open text-primary me-2"></i> 可用房型
                    </h5>
                    <div id="roomPlansList">
                        <div class="text-center py-3 text-muted">
                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                            加载房型信息...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex gap-3 mb-4 flex-wrap">
                <!-- 预订链接按钮 (booking_url from RollingGo) -->
                <a id="bookingUrlBtn" class="btn btn-primary btn-lg" style="display: none;" target="_blank">
                    <i class="bi bi-box-arrow-up-right me-2"></i> 前往 RollingGo 预订
                </a>
                <button id="favoriteBtn" class="btn btn-outline-danger" onclick="toggleFavorite()">
                    <i class="bi bi-heart me-2"></i> <span>收藏</span>
                </button>
                <button class="btn btn-outline-primary" onclick="shareHotel()">
                    <i class="bi bi-share me-2"></i> 分享
                </button>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-danger" style="display: none;">
            <i class="bi bi-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-light py-4 mt-5">
        <div class="container text-center text-muted">
            <p>酒店搜索服务由 RollingGo 提供</p>
        </div>
    </footer>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">加载中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Global variables
        let currentHotel = null;
        let searchParams = null;
        const hotelId = '{{ hotel_id }}';
        let currentImageUrl = null;
        let allHotelImages = [];
        let displayedImageCount = 6;
        let mapInstance = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Get search data from session storage
            const searchParamsStr = sessionStorage.getItem('detailSearchParams') || sessionStorage.getItem('searchData');

            searchParams = searchParamsStr ? JSON.parse(searchParamsStr) : {};

            // Load favorites count
            loadFavoritesCount();

            // Load hotel detail (always RollingGo)
            loadHotelDetail('rollinggo');
        });

        async function loadHotelDetail(provider) {
            try {
                // Build query parameters for RollingGo
                const params = new URLSearchParams();
                params.append('provider', 'rollinggo');

                // RollingGo date parameters
                let checkInDate = searchParams.check_in_date || searchParams.check_in;
                let stayNights = searchParams.stay_nights || 1;

                if (!checkInDate) {
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    checkInDate = tomorrow.toISOString().split('T')[0];
                }

                params.append('check_in_date', checkInDate);

                // 计算 check_out_date
                const checkInDateObj = new Date(checkInDate);
                const checkOutDateObj = new Date(checkInDateObj);
                checkOutDateObj.setDate(checkOutDateObj.getDate() + stayNights);
                params.append('check_out_date', checkOutDateObj.toISOString().split('T')[0]);

                params.append('adult_count', searchParams.adult_count || 2);
                params.append('child_count', searchParams.child_count || 0);

                const url = `/api/hotel/${hotelId}?${params.toString()}`;
                const response = await fetch(url);
                const result = await response.json();

                document.getElementById('loadingPlaceholder').style.display = 'none';

                if (result.success) {
                    currentHotel = result.data;

                    // 从搜索列表缓存中获取图片 URL（详情 API 不返回图片）
                    const hotelListDataStr = sessionStorage.getItem('hotelListData');
                    if (hotelListDataStr && !currentHotel.image_url) {
                        try {
                            const hotelListData = JSON.parse(hotelListDataStr);
                            const cachedData = hotelListData[hotelId];
                            if (cachedData && cachedData.image_url) {
                                currentHotel.image_url = cachedData.image_url;
                                console.log('[Detail] Using cached image_url from search list');
                            }
                        } catch (e) {
                            console.warn('[Detail] Failed to parse hotelListData:', e);
                        }
                    }

                    renderHotelDetail(currentHotel);
                    document.getElementById('hotelContent').style.display = 'block';
                } else {
                    showError(result.error || '加载酒店详情失败');
                }
            } catch (error) {
                document.getElementById('loadingPlaceholder').style.display = 'none';
                showError('网络错误，请检查网络连接后重试');
                console.error('Load hotel detail error:', error);
            }
        }

        function renderHotelDetail(hotel) {
            // Provider badge is already set in HTML

            // Basic info
            document.getElementById('hotelName').textContent = hotel.name;
            document.getElementById('hotelAddress').textContent = hotel.address || '';

            // Stars
            if (hotel.star_rating) {
                document.getElementById('hotelStars').innerHTML = '★'.repeat(Math.round(hotel.star_rating));
            }

            // Rating
            const ratingBadge = document.getElementById('hotelRating');
            if (hotel.rating) {
                ratingBadge.innerHTML = `<i class="bi bi-star-fill me-1"></i>${hotel.rating.toFixed(1)}`;
                ratingBadge.style.display = 'inline-flex';
            } else {
                ratingBadge.style.display = 'none';
            }

            // Distance
            if (hotel.distance) {
                document.getElementById('hotelDistance').innerHTML = `<i class="bi bi-geo-alt"></i> 距目的地 ${(hotel.distance / 1000).toFixed(1)} km`;
            }

            // Price
            if (hotel.price_per_night) {
                document.getElementById('hotelPrice').textContent = `${hotel.currency || '¥'}${hotel.price_per_night}`;
            } else {
                document.getElementById('hotelPrice').textContent = '暂无报价';
            }

            // Brand info (RollingGo)
            if (hotel.brand) {
                document.getElementById('brandInfo').style.display = 'block';
                document.getElementById('brandName').textContent = hotel.brand;
            }

            // Main image
            const mainImageUrl = hotel.image_url || hotel.images?.[0] || '/static/img/placeholder-hotel.png';
            currentImageUrl = mainImageUrl;
            document.getElementById('mainImage').style.backgroundImage = `url('${mainImageUrl}')`;

            // Image gallery - 支持显示更多图片
            allHotelImages = hotel.images || [];
            if (allHotelImages.length > 0) {
                renderImageGallery();
            }

            // Tags
            if (hotel.tags && hotel.tags.length > 0) {
                const tagsHtml = hotel.tags.map(tag => `<span class="hotel-tag">${tag}</span>`).join('');
                document.getElementById('hotelTags').innerHTML = tagsHtml;
            }

            // Description - 添加展开/收起功能
            if (hotel.description) {
                renderDescription(hotel.description);
                document.getElementById('descriptionSection').style.display = 'block';
            }

            // Map - 使用经纬度初始化地图
            if (hotel.latitude && hotel.longitude) {
                initMap(hotel.latitude, hotel.longitude, hotel.name, hotel.address);
            }

            // Amenities
            if (hotel.amenities && hotel.amenities.length > 0) {
                const amenitiesHtml = hotel.amenities.map(amenity => `
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="amenity-item d-flex align-items-center">
                            <i class="bi bi-check-circle-fill text-success me-2"></i>
                            <span>${amenity}</span>
                        </div>
                    </div>
                `).join('');
                document.getElementById('amenitiesList').innerHTML = amenitiesHtml;
                document.getElementById('amenitiesSection').style.display = 'block';
            }

            // Booking dates - 显示预订日期信息
            if (hotel.check_in && hotel.check_out) {
                document.getElementById('checkInDate').textContent = formatDate(hotel.check_in);
                document.getElementById('checkOutDate').textContent = formatDate(hotel.check_out);
                // 计算入住晚数
                const checkIn = new Date(hotel.check_in);
                const checkOut = new Date(hotel.check_out);
                const nights = Math.round((checkOut - checkIn) / (1000 * 60 * 60 * 24));
                document.getElementById('stayNights').textContent = `${nights} 晚`;
                document.getElementById('bookingDatesSection').style.display = 'block';
            }

            // Room plans - 只展示信息，不需要站内预订按钮
            renderRoomPlans(hotel.room_plans || []);

            // 预订链接按钮 (booking_url from RollingGo)
            const bookingUrlBtn = document.getElementById('bookingUrlBtn');
            if (hotel.booking_url) {
                bookingUrlBtn.href = hotel.booking_url;
                bookingUrlBtn.style.display = 'inline-flex';
            } else {
                bookingUrlBtn.style.display = 'none';
            }

            // Update favorite button
            updateFavoriteButton(hotel.is_favorite);
        }

        // 渲染图片画廊
        function renderImageGallery() {
            const imagesToShow = allHotelImages.slice(0, displayedImageCount);
            const galleryHtml = imagesToShow.map((img, i) => `
                <div class="gallery-thumb ${i === 0 ? 'active' : ''}" style="background-image: url('${img}')" onclick="setMainImage('${img}', this)"></div>
            `).join('');
            document.getElementById('imageGallery').innerHTML = galleryHtml;

            // 显示"查看更多"按钮
            const moreBtn = document.getElementById('moreImagesBtn');
            if (allHotelImages.length > displayedImageCount) {
                document.getElementById('totalImages').textContent = allHotelImages.length - displayedImageCount;
                moreBtn.style.display = 'block';
            } else {
                moreBtn.style.display = 'none';
            }
        }

        // 显示所有图片
        function showAllImages() {
            displayedImageCount = 20; // 最多显示20张
            renderImageGallery();
        }

        // 渲染描述（支持展开/收起）
        function renderDescription(description) {
            const maxLength = 300;
            const descDiv = document.getElementById('hotelDescription');

            if (description.length <= maxLength) {
                descDiv.textContent = description;
            } else {
                const shortDesc = description.substring(0, maxLength);
                descDiv.innerHTML = `
                    <span id="descShort">${shortDesc}...</span>
                    <span id="descFull" style="display: none;">${description}</span>
                    <span class="description-toggle" onclick="toggleDescription()">
                        <i class="bi bi-chevron-down ms-1"></i> 展开全部
                    </span>
                `;
            }
        }

        // 切换描述展开/收起
        function toggleDescription() {
            const shortDesc = document.getElementById('descShort');
            const fullDesc = document.getElementById('descFull');
            const toggle = document.querySelector('.description-toggle');

            if (fullDesc.style.display === 'none') {
                shortDesc.style.display = 'none';
                fullDesc.style.display = 'inline';
                toggle.innerHTML = '<i class="bi bi-chevron-up ms-1"></i> 收起';
            } else {
                shortDesc.style.display = 'inline';
                fullDesc.style.display = 'none';
                toggle.innerHTML = '<i class="bi bi-chevron-down ms-1"></i> 展开全部';
            }
        }

        // 初始化地图
        function initMap(lat, lng, hotelName, address) {
            const mapSection = document.getElementById('mapSection');
            mapSection.style.display = 'block';

            // 初始化地图
            mapInstance = L.map('hotelMap').setView([lat, lng], 15);

            // 使用 OpenStreetMap 免费瓦片
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(mapInstance);

            // 添加标记点
            L.marker([lat, lng]).addTo(mapInstance)
                .bindPopup(`<strong>${hotelName}</strong><br>${address || ''}`);

            // 显示地址
            document.getElementById('mapAddress').innerHTML = `<i class="bi bi-geo-alt me-1"></i>${address || ''}`;
        }

        // 图片灯箱
        function openLightbox(imageUrl) {
            const lightbox = document.createElement('div');
            lightbox.className = 'image-lightbox';
            lightbox.innerHTML = `
                <img src="${imageUrl}" style="max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
                <button class="btn btn-light position-absolute top-0 end-0 m-3" onclick="this.parentElement.remove()">
                    <i class="bi bi-x-lg"></i>
                </button>
                <div class="lightbox-nav position-absolute top-50 start-0 translate-middle-y ms-3">
                    <button class="btn btn-light btn-lg rounded-circle" onclick="navigateLightbox(-1)">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                </div>
                <div class="lightbox-nav position-absolute top-50 end-0 translate-middle-y me-3">
                    <button class="btn btn-light btn-lg rounded-circle" onclick="navigateLightbox(1)">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            `;
            lightbox.onclick = (e) => { if (e.target === lightbox) lightbox.remove(); };
            document.body.appendChild(lightbox);
            currentImageUrl = imageUrl;
        }

        // 灯箱图片导航
        function navigateLightbox(direction) {
            const currentIndex = allHotelImages.indexOf(currentImageUrl);
            let newIndex = currentIndex + direction;

            if (newIndex < 0) newIndex = allHotelImages.length - 1;
            if (newIndex >= allHotelImages.length) newIndex = 0;

            const newUrl = allHotelImages[newIndex];
            document.querySelector('.image-lightbox img').src = newUrl;
            currentImageUrl = newUrl;
        }

        function renderRoomPlans(roomPlans) {
            const container = document.getElementById('roomPlansList');

            if (!roomPlans || roomPlans.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-4">
                        <i class="bi bi-calendar-x display-4 text-muted"></i>
                        <p class="text-muted mt-2">暂无可预订房型</p>
                    </div>
                `;
                return;
            }

            const html = roomPlans.map((plan, index) => {
                // 床型标签
                const bedTypeBadge = plan.bed_type ? `
                    <span class="badge bg-light text-dark border me-2">
                        <i class="bi bi-bed me-1"></i>${plan.bed_type}
                    </span>
                ` : '';

                // 取消政策
                const cancellationInfo = plan.cancellation ? `
                    <div class="text-muted small mt-2">
                        <i class="bi bi-info-circle me-1"></i>${plan.cancellation}
                    </div>
                ` : '';

                // 总价显示
                const totalPriceHtml = plan.total_price ? `
                    <div class="text-muted small">
                        总价: ${plan.currency || '¥'}${plan.total_price}
                    </div>
                ` : '';

                return `
                    <div class="room-plan-card mb-3" style="animation-delay: ${index * 0.1}s;">
                        <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center p-4">
                            <div class="flex-grow-1 mb-3 mb-md-0">
                                <h6 class="mb-2 fw-bold">${plan.name || '标准房型'}</h6>
                                <div class="mb-2">
                                    ${bedTypeBadge}
                                </div>
                                <p class="text-muted small mb-2">${plan.description || ''}</p>
                                ${plan.amenities && plan.amenities.length > 0 ? `
                                    <div class="d-flex flex-wrap gap-2">
                                        ${plan.amenities.slice(0, 3).map(a => `<span class="badge bg-light text-dark border">${a}</span>`).join('')}
                                        ${plan.amenities.length > 3 ? `<span class="badge bg-light text-muted">+${plan.amenities.length - 3}</span>` : ''}
                                    </div>
                                ` : ''}
                                ${cancellationInfo}
                            </div>
                            <div class="text-md-end ms-md-4">
                                ${plan.available ? `
                                    <div class="mb-2">
                                        <span class="fs-4 fw-bold text-primary" style="font-family: var(--font-number);">${plan.currency || '¥'}${plan.price_per_night || plan.price || '询价'}</span>
                                        <span class="text-muted small">/晚</span>
                                    </div>
                                    ${totalPriceHtml}
                                    <span class="badge bg-light text-muted">请使用上方预订按钮</span>
                                ` : `
                                    <div class="text-center">
                                        <span class="badge bg-danger bg-opacity-10 text-danger">
                                            <i class="bi bi-x-circle me-1"></i> 满房
                                        </span>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        // 格式化日期为友好格式 (YYYY-MM-DD -> MM月DD日 周X)
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[date.getDay()];
            return `${month}月${day}日 ${weekDay}`;
        }

        function setMainImage(url, thumbElement) {
            currentImageUrl = url;
            document.getElementById('mainImage').style.backgroundImage = `url('${url}')`;
            // Update active thumbnail
            document.querySelectorAll('.gallery-thumb').forEach(thumb => thumb.classList.remove('active'));
            if (thumbElement) {
                thumbElement.classList.add('active');
            }
        }

        function updateFavoriteButton(isFavorite) {
            const btn = document.getElementById('favoriteBtn');
            const icon = btn.querySelector('i');
            const text = btn.querySelector('span');

            if (isFavorite) {
                icon.className = 'bi bi-heart-fill';
                text.textContent = '已收藏';
                btn.classList.add('active');
            } else {
                icon.className = 'bi bi-heart';
                text.textContent = '收藏';
                btn.classList.remove('active');
            }
        }

        async function toggleFavorite() {
            if (!currentHotel) return;

            try {
                const response = await fetch('/api/favorites/toggle', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        hotel_id: currentHotel.hotel_id,
                        hotel_data: currentHotel
                    })
                });

                const result = await response.json();

                if (result.success) {
                    currentHotel.is_favorite = result.data.is_favorite;
                    updateFavoriteButton(result.data.is_favorite);
                    loadFavoritesCount();
                }
            } catch (error) {
                console.error('Toggle favorite error:', error);
            }
        }

        function shareHotel() {
            const url = window.location.href;
            const title = currentHotel ? currentHotel.name : '酒店详情';

            if (navigator.share) {
                navigator.share({
                    title: title,
                    url: url
                }).catch(() => {});
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(url).then(() => {
                    alert('链接已复制到剪贴板');
                });
            }
        }

        function goBack() {
            if (document.referrer.includes('/results')) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorText').textContent = message;
        }
    </script>
