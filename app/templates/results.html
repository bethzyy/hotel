<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>搜索结果 - 酒店搜索比价</title>
    <meta name="description" content="酒店搜索结果 - 多平台价格对比，找到最优惠的酒店。">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-building"></i> 酒店搜索
            </a>
            <div class="d-flex align-items-center">
                <a class="btn btn-outline-light btn-sm me-2" href="/">
                    <i class="bi bi-arrow-left"></i> 返回搜索
                </a>
                <a class="nav-link text-white" href="#" id="favoritesLink">
                    <i class="bi bi-heart"></i> 收藏
                    <span class="badge bg-danger" id="favoritesCount">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <!-- Search Info Header -->
        <div class="search-info mb-4 page-enter">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h4 id="searchTitle" class="mb-2 fw-bold">
                        <i class="bi bi-geo-alt-fill text-primary"></i> <span id="searchPlace">加载中...</span>
                    </h4>
                    <div id="searchParams" class="text-muted"></div>
                </div>
                <div class="text-end">
                    <span class="badge bg-info rounded-pill px-3 py-2">
                        <i class="bi bi-globe2 me-1"></i> RollingGo
                    </span>
                </div>
            </div>
        </div>

        <!-- Results Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-primary rounded-pill px-3 py-2" id="resultsCount">0</span>
                <span class="text-muted">家酒店</span>
            </div>
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-secondary btn-sm active" data-sort="default" onclick="sortResults('default')">
                    默认排序
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm" data-sort="price" onclick="togglePriceSort()">
                    <i class="bi bi-arrow-up" id="price-sort-icon"></i> 价格
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm" data-sort="rating" onclick="sortResults('rating')">
                    <i class="bi bi-arrow-down"></i> 评分
                </button>
                <button type="button" class="btn btn-outline-secondary btn-sm" data-sort="distance" onclick="sortResults('distance')">
                    <i class="bi bi-arrow-up"></i> 距离
                </button>
            </div>
        </div>

        <!-- Results List -->
        <div id="resultsList" class="hotel-list">
            <!-- Skeleton Loading Placeholders -->
            <div id="loadingPlaceholder">
                <div class="row g-3">
                    <div class="col-12">
                        <div class="card skeleton-card">
                            <div class="row g-0">
                                <div class="col-md-3">
                                    <div class="skeleton skeleton-image"></div>
                                </div>
                                <div class="col-md-9">
                                    <div class="card-body">
                                        <div class="skeleton skeleton-text" style="width: 40%; height: 24px;"></div>
                                        <div class="skeleton skeleton-text mt-2" style="width: 60%;"></div>
                                        <div class="skeleton skeleton-text mt-2" style="width: 80%;"></div>
                                        <div class="d-flex gap-2 mt-3">
                                            <div class="skeleton" style="width: 60px; height: 24px; border-radius: 4px;"></div>
                                            <div class="skeleton" style="width: 60px; height: 24px; border-radius: 4px;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="card skeleton-card">
                            <div class="row g-0">
                                <div class="col-md-3">
                                    <div class="skeleton skeleton-image"></div>
                                </div>
                                <div class="col-md-9">
                                    <div class="card-body">
                                        <div class="skeleton skeleton-text" style="width: 50%; height: 24px;"></div>
                                        <div class="skeleton skeleton-text mt-2" style="width: 70%;"></div>
                                        <div class="skeleton skeleton-text mt-2" style="width: 60%;"></div>
                                        <div class="d-flex gap-2 mt-3">
                                            <div class="skeleton" style="width: 60px; height: 24px; border-radius: 4px;"></div>
                                            <div class="skeleton" style="width: 60px; height: 24px; border-radius: 4px;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="card skeleton-card">
                            <div class="row g-0">
                                <div class="col-md-3">
                                    <div class="skeleton skeleton-image"></div>
                                </div>
                                <div class="col-md-9">
                                    <div class="card-body">
                                        <div class="skeleton skeleton-text" style="width: 45%; height: 24px;"></div>
                                        <div class="skeleton skeleton-text mt-2" style="width: 65%;"></div>
                                        <div class="skeleton skeleton-text mt-2" style="width: 75%;"></div>
                                        <div class="d-flex gap-2 mt-3">
                                            <div class="skeleton" style="width: 60px; height: 24px; border-radius: 4px;"></div>
                                            <div class="skeleton" style="width: 60px; height: 24px; border-radius: 4px;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- No Results -->
        <div id="noResults" class="empty-state" style="display: none;">
            <div class="empty-state-icon">
                <i class="bi bi-search"></i>
            </div>
            <h4>未找到符合条件的酒店</h4>
            <p class="text-muted">请尝试调整搜索条件或更换日期</p>
            <a href="/" class="btn btn-primary btn-lg">
                <i class="bi bi-arrow-left me-2"></i> 修改搜索条件
            </a>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-danger border-0 rounded-4" style="display: none;">
            <div class="d-flex align-items-center">
                <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
                <div>
                    <strong>搜索出错</strong>
                    <p class="mb-0 small" id="errorText"></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">加载中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Global variables
        let allHotels = [];
        let currentSort = 'default';
        let priceSortAsc = true;
        let searchData = null;
        let comparisonData = {};  // Store comparison results
        let sourceProvider = 'rollinggo';  // Track search source provider

        document.addEventListener('DOMContentLoaded', function() {
            // Get search data from session storage
            const searchDataStr = sessionStorage.getItem('searchData');
            const searchPlace = sessionStorage.getItem('searchPlace');

            if (!searchDataStr) {
                window.location.href = '/';
                return;
            }

            // Update header
            if (searchPlace) {
                document.getElementById('searchPlace').textContent = searchPlace;
            }

            searchData = JSON.parse(searchDataStr);
            displaySearchParams(searchData);

            // Load favorites count
            loadFavoritesCount();

            // Perform search
            performSearch(searchData);
        });

        function displaySearchParams(data) {
            const paramsDiv = document.getElementById('searchParams');
            let params = [];

            if (data.check_in_date) {
                params.push(`入住: ${data.check_in_date}`);
            }
            if (data.stay_nights) {
                params.push(`${data.stay_nights} 晚`);
            }

            params.push(`${data.adult_count} 成人`);
            if (data.child_count > 0) {
                params.push(`${data.child_count} 儿童`);
            }

            paramsDiv.textContent = params.join(' · ');
        }

        async function performSearch(searchData) {
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(searchData)
                });

                const result = await response.json();

                document.getElementById('loadingPlaceholder').style.display = 'none';

                if (result.success) {
                    allHotels = result.data.hotels || [];
                    sourceProvider = result.data.provider || 'rollinggo';  // Save source provider

                    document.getElementById('resultsCount').textContent = allHotels.length;
                    renderHotels(allHotels);

                    if (allHotels.length === 0) {
                        document.getElementById('noResults').style.display = 'block';
                    }
                    // Comparison is now manual - triggered by button click
                } else {
                    showError(result.error || '搜索失败，请重试');
                }
            } catch (error) {
                document.getElementById('loadingPlaceholder').style.display = 'none';
                showError('网络错误，请检查网络连接后重试');
                console.error('Search error:', error);
            }
        }

        function updateComparisonUI() {
            // Update each hotel card with comparison data
            Object.keys(comparisonData).forEach(hotelId => {
                const compCard = document.querySelector(`[data-comparison-id="${hotelId}"]`);
                if (!compCard) return;

                const data = comparisonData[hotelId];
                renderComparisonSection(compCard, data);
            });
        }

        // Currency symbol mapping for proper display
        const CURRENCY_SYMBOLS = {
            'CNY': '¥',
            'USD': '$',
            'EUR': '€',
            'GBP': '£',
            'HKD': 'HK$',
            'TWD': 'NT$',
            'JPY': '¥',
            'KRW': '₩',
            'SGD': 'S$',
            'AUD': 'A$',
            'THB': '฿',
            'MYR': 'RM'
        };

        function getCurrencySymbol(currency) {
            // If currency is already a symbol, return it
            if (!currency || currency.length <= 3) {
                return currency || '¥';
            }
            // Otherwise look up in mapping
            return CURRENCY_SYMBOLS[currency] || '¥';
        }

        // Format price with CNY conversion display
        function formatPriceWithCny(price, currency, priceCny) {
            if (price === null || price === undefined) {
                return '暂无报价';
            }

            const symbol = getCurrencySymbol(currency);

            // If already CNY or no conversion provided, show original
            if (currency === 'CNY' || priceCny === null || priceCny === undefined) {
                return `${symbol}${price}`;
            }

            // Show original price with CNY equivalent
            return `${symbol}${price} <small class="text-muted">(≈¥${priceCny})</small>`;
        }

        function renderComparisonSection(compCard, data, showCollapse = true) {
            const comparisons = data.comparisons || [];
            const externalPrices = data.external_prices || [];
            const bestPrice = data.best_price;
            const sourcePrice = data.source.price;
            const sourceCurrency = getCurrencySymbol(data.source.currency);
            const hotelId = data.source.hotel_id;

            // Check both comparisons and external_prices
            if (comparisons.length === 0 && externalPrices.length === 0) {
                compCard.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="section-title"><i class="bi bi-cash-stack"></i> 多平台比价</div>
                        ${showCollapse ? '<button class="btn btn-link btn-sm text-muted p-0" onclick="collapseComparison(\'' + hotelId + '\')">收起 ▲</button>' : ''}
                    </div>
                    <span class="text-muted small">暂无其他平台报价</span>
                `;
                compCard.style.display = 'block';
                return;
            }

            // Build comparison HTML
            let html = `
                <div class="d-flex justify-content-between align-items-center">
                    <div class="section-title"><i class="bi bi-cash-stack"></i> 多平台比价</div>
                    ${showCollapse ? '<button class="btn btn-link btn-sm text-muted p-0" onclick="collapseComparison(\'' + hotelId + '\')">收起 ▲</button>' : ''}
                </div>
            `;

            // Only show internal providers with real-time prices (not source provider)
            if (comparisons.length > 0) {
                html += '<div class="comparison-list">';
                comparisons.forEach(comp => {
                    const isBest = bestPrice && bestPrice.provider === comp.provider;
                    const providerName = comp.provider === 'rollinggo' ? 'RollingGo' : '途牛';
                    const priceDisplay = formatPriceWithCny(comp.price, comp.currency, comp.price_cny);
                    const saveAmount = sourcePrice && comp.price && comp.price < sourcePrice ? sourcePrice - comp.price : null;

                    html += `
                        <div class="comparison-item ${isBest ? 'best' : ''}">
                            <span class="provider-name">${providerName}</span>
                            <span class="provider-price">${priceDisplay}</span>
                            ${isBest ? '<span class="best-badge">🏆 最低价</span>' : ''}
                            ${saveAmount ? `<span class="save-badge">省${sourceCurrency}${saveAmount}</span>` : ''}
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Show external platform prices in collapsible panel
            if (externalPrices.length > 0) {
                html += `
                    <div class="external-platforms-panel mt-2">
                        <button class="btn btn-outline-secondary btn-sm w-100" type="button"
                                data-bs-toggle="collapse" data-bs-target="#external-${hotelId}">
                            <i class="bi bi-list-ul me-1"></i> 查看更多平台 (Booking, KAYAK 等)
                            <i class="bi bi-chevron-down ms-1"></i>
                        </button>
                        <div class="collapse mt-2" id="external-${hotelId}">
                            <div class="card card-body p-2">
                                <small class="text-muted mb-2 info-hint">
                                    <i class="bi bi-info-circle me-1"></i>
                                    以下价格仅供参考，请点击查看实际价格
                                </small>
                                <div class="comparison-list">
                `;

                externalPrices.forEach(ext => {
                    const iconClass = ext.icon || 'bi-link-45deg';
                    const priceText = ext.price ? formatPriceWithCny(ext.price, ext.currency, ext.price_cny) : '查看报价';

                    html += `
                        <div class="comparison-item external">
                            <span class="provider-name"><i class="bi ${iconClass} me-1"></i>${ext.platform_name}</span>
                            <a href="${ext.url}" target="_blank" class="btn btn-outline-primary btn-sm">
                                ${priceText} <i class="bi bi-box-arrow-up-right ms-1"></i>
                            </a>
                        </div>
                    `;
                });

                html += `
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            compCard.innerHTML = html;
            compCard.style.display = 'block';
        }

        async function toggleHotelComparison(event, hotelId, hotelData) {
            event.preventDefault();
            event.stopPropagation();

            const btn = event.currentTarget;
            const compCard = document.querySelector(`[data-comparison-id="${hotelId}"]`);

            if (!compCard) return;

            // If already visible, collapse it
            if (compCard.style.display === 'block' && compCard.innerHTML.includes('收起')) {
                collapseComparison(hotelId);
                return;
            }

            // Check if we already have cached data
            if (comparisonData[hotelId]) {
                renderComparisonSection(compCard, comparisonData[hotelId]);
                btn.innerHTML = '<i class="bi bi-cash-stack me-1"></i> 收起比价';
                return;
            }

            // Show loading state
            compCard.innerHTML = `
                <div class="section-title"><i class="bi bi-cash-stack"></i> 多平台比价</div>
                <div class="loading-text">
                    <div class="spinner-border spinner-border-sm" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <span>正在查询其他平台价格...</span>
                </div>
            `;
            compCard.style.display = 'block';
            btn.disabled = true;

            try {
                let checkIn = searchData.check_in_date || searchData.check_in;
                let checkOut = searchData.check_out_date || searchData.check_out;

                // 如果没有 check_out，根据 stay_nights 计算
                if (!checkOut && checkIn) {
                    const checkInDate = new Date(checkIn);
                    const stayNights = searchData.stay_nights || 1;
                    const checkOutDate = new Date(checkInDate);
                    checkOutDate.setDate(checkOutDate.getDate() + stayNights);
                    checkOut = checkOutDate.toISOString().split('T')[0];
                }

                const params = new URLSearchParams({
                    check_in: checkIn,
                    check_out: checkOut,
                    hotel_name: hotelData.name || '',
                    hotel_address: hotelData.address || '',
                    hotel_lat: hotelData.latitude || '',
                    hotel_lng: hotelData.longitude || '',
                    adult_count: searchData.adult_count || 2,
                    child_count: searchData.child_count || 0
                });

                const response = await fetch(`/api/compare/${sourceProvider}/${hotelId}?${params.toString()}`);
                const result = await response.json();

                if (result.success) {
                    comparisonData[hotelId] = result.data;
                    renderComparisonSection(compCard, result.data);
                    btn.innerHTML = '<i class="bi bi-cash-stack me-1"></i> 收起比价';
                } else {
                    compCard.innerHTML = `
                        <div class="section-title"><i class="bi bi-cash-stack"></i> 多平台比价</div>
                        <span class="text-danger small">${result.error || '查询失败'}</span>
                    `;
                }
            } catch (error) {
                console.error('Comparison error:', error);
                compCard.innerHTML = `
                    <div class="section-title"><i class="bi bi-cash-stack"></i> 多平台比价</div>
                    <span class="text-danger small">网络错误，请重试</span>
                `;
            } finally {
                btn.disabled = false;
            }
        }

        function collapseComparison(hotelId) {
            const compCard = document.querySelector(`[data-comparison-id="${hotelId}"]`);
            const btn = document.querySelector(`[data-compare-btn="${hotelId}"]`);

            if (compCard) {
                compCard.style.display = 'none';
            }
            if (btn) {
                btn.innerHTML = '<i class="bi bi-cash-stack me-1"></i> 比价';
            }
        }

        function renderHotels(hotels) {
            const container = document.getElementById('resultsList');
            container.innerHTML = '';

            hotels.forEach((hotel, index) => {
                const card = createHotelCard(hotel, index);
                container.appendChild(card);
            });
        }

        function createHotelCard(hotel, index) {
            const div = document.createElement('div');
            div.className = 'card hotel-card mb-3';
            div.style.setProperty('--index', index);

            // 对图片URL进行编码，处理空格等特殊字符
            const placeholderUrl = '/static/img/placeholder-hotel.svg';
            const rawImageUrl = hotel.image_url || placeholderUrl;
            const imageUrl = rawImageUrl === placeholderUrl ? rawImageUrl : encodeURI(rawImageUrl);
            console.log('Hotel data:', hotel);
            console.log('Image URL:', imageUrl);
            const price = hotel.price_per_night ? `${hotel.currency || '¥'}${hotel.price_per_night}` : '暂无报价';
            const distance = hotel.distance ? `${(hotel.distance / 1000).toFixed(1)} km` : '';
            const rating = hotel.rating ? hotel.rating.toFixed(1) : '';
            const starRating = hotel.star_rating ? '★'.repeat(Math.round(hotel.star_rating)) : '';

            const isFavorite = hotel.is_favorite || false;
            const heartClass = isFavorite ? 'bi-heart-fill text-danger' : 'bi-heart';

            // 国家/地区标签
            const areaBadge = hotel.area_name ? `
                <span class="badge bg-info bg-opacity-10 text-info me-2">
                    <i class="bi bi-globe me-1"></i>${hotel.area_name}
                </span>
            ` : '';

            // RollingGo 品牌标签
            const brandBadge = hotel.brand ? `<span class="badge bg-light text-dark border me-2">${hotel.brand}</span>` : '';

            // 改进的距离显示（显示搜索地点）
            const searchPlace = sessionStorage.getItem('searchPlace') || '目的地';
            const distanceText = hotel.distance ? `
                <span class="text-muted small">
                    <i class="bi bi-geo-alt"></i> 距${searchPlace} ${distance}
                </span>
            ` : '';

            // 设施预览（前4个）
            const amenitiesPreview = hotel.amenities && hotel.amenities.length > 0 ? `
                <div class="amenities-preview mt-2">
                    ${hotel.amenities.slice(0, 4).map(a => `<span class="amenity-tag"><i class="bi bi-check-circle-fill text-success me-1"></i>${a}</span>`).join('')}
                </div>
            ` : '';

            // 描述预览（前100字，最多2行）
            const descPreview = hotel.description ? `
                <p class="text-muted small mt-2 mb-0 desc-preview">
                    ${hotel.description.length > 80 ? hotel.description.substring(0, 80) + '...' : hotel.description}
                </p>
            ` : '';

            // 预订按钮 (booking_url from RollingGo)
            const bookingBtn = hotel.booking_url ? `
                <a href="${hotel.booking_url}" target="_blank" class="btn btn-success btn-sm ms-2">
                    <i class="bi bi-box-arrow-up-right me-1"></i> 前往预订
                </a>
            ` : '';

            // 比价按钮
            const compareBtn = `
                <button class="btn btn-outline-secondary btn-sm ms-2"
                        onclick="toggleHotelComparison(event, '${hotel.hotel_id}', ${JSON.stringify(hotel).replace(/"/g, '&quot;')})"
                        data-compare-btn="${hotel.hotel_id}">
                    <i class="bi bi-cash-stack me-1"></i> 比价
                </button>
            `;

            // 比价区域（默认隐藏）
            const comparisonSection = `
                <div class="comparison-section mt-3" data-comparison-id="${hotel.hotel_id}" style="display: none;">
                    <!-- 比价内容动态加载 -->
                </div>
            `;

            div.innerHTML = `
                <div class="row g-0">
                    <div class="col-md-4">
                        <div class="hotel-image-wrapper" style="height: 100%; min-height: 200px;">
                            <div class="hotel-image h-100">
                                <img src="${imageUrl}"
                                     alt="${hotel.name}"
                                     onerror="this.onerror=null; this.src='${placeholderUrl}'; console.warn('图片加载失败:', '${imageUrl}');"
                                     loading="lazy">
                                <button class="btn btn-light btn-sm favorite-btn position-absolute top-0 end-0 m-2 shadow-sm"
                                        onclick="toggleFavorite(event, '${hotel.hotel_id}', ${JSON.stringify(hotel).replace(/"/g, '&quot;')})">
                                    <i class="bi ${heartClass}"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="hotel-name mb-0 flex-grow-1 me-3">
                                    ${areaBadge}${brandBadge}${hotel.name}
                                </h5>
                                <div class="text-end flex-shrink-0">
                                    <div class="price-badge">${price}</div>
                                    <small class="text-muted">每晚</small>
                                </div>
                            </div>
                            <p class="card-text text-muted small mb-2">
                                ${starRating ? `<span class="star-rating me-2">${starRating}</span>` : ''}
                                ${hotel.address || ''}
                            </p>
                            <div class="d-flex align-items-center gap-3 mb-2 flex-wrap">
                                ${rating ? `<span class="rating-badge"><i class="bi bi-star-fill"></i> ${rating}</span>` : ''}
                                ${distanceText}
                            </div>
                            ${hotel.tags && hotel.tags.length > 0 ? `
                                <div class="hotel-tags mt-2">
                                    ${hotel.tags.slice(0, 4).map(tag => `<span class="tag">${tag}</span>`).join('')}
                                </div>
                            ` : ''}
                            ${amenitiesPreview}
                            ${descPreview}
                            ${comparisonSection}
                            <div class="mt-3">
                                <a href="/detail/${hotel.hotel_id}" class="btn btn-primary btn-sm" onclick="storeHotelData(event, '${hotel.hotel_id}')">
                                    <i class="bi bi-eye me-1"></i> 查看详情
                                </a>
                                ${bookingBtn}
                                ${compareBtn}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            return div;
        }

        function storeHotelData(event, hotelId) {
            // Store current search params for detail page
            sessionStorage.setItem('detailSearchParams', JSON.stringify(searchData));

            // Store hotel list data (including image_url) for detail page
            // 详情 API 不返回图片，需要从搜索列表传递
            const hotelDataMap = {};
            allHotels.forEach(h => {
                hotelDataMap[h.hotel_id] = {
                    image_url: h.image_url,
                    name: h.name,
                    address: h.address,
                    star_rating: h.star_rating,
                    rating: h.rating,
                    brand: h.brand,
                    area_name: h.area_name
                };
            });
            sessionStorage.setItem('hotelListData', JSON.stringify(hotelDataMap));
        }

        function sortResults(sortType) {
            currentSort = sortType;

            // Update button states
            document.querySelectorAll('[data-sort]').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.sort === sortType) {
                    btn.classList.add('active');
                }
            });

            // Sort hotels
            let sorted = [...allHotels];

            switch (sortType) {
                case 'price':
                    sorted.sort((a, b) => (a.price_per_night || Infinity) - (b.price_per_night || Infinity));
                    break;
                case 'rating':
                    sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
                    break;
                case 'distance':
                    sorted.sort((a, b) => (a.distance || Infinity) - (b.distance || Infinity));
                    break;
                default:
                    // Keep original order
                    break;
            }

            renderHotels(sorted);
        }

        function togglePriceSort() {
            // 切换排序方向
            priceSortAsc = !priceSortAsc;

            // 更新图标
            const icon = document.getElementById('price-sort-icon');
            icon.className = priceSortAsc ? 'bi bi-arrow-up' : 'bi bi-arrow-down';

            // 更新按钮状态
            document.querySelectorAll('[data-sort]').forEach(btn => btn.classList.remove('active'));
            document.querySelector('[data-sort="price"]').classList.add('active');

            currentSort = 'price';

            // 排序
            let sorted = [...allHotels];
            sorted.sort((a, b) => {
                const priceA = a.price_per_night || Infinity;
                const priceB = b.price_per_night || Infinity;
                return priceSortAsc ? priceA - priceB : priceB - priceA;
            });

            renderHotels(sorted);
        }

        async function toggleFavorite(event, hotelId, hotelData) {
            event.preventDefault();
            event.stopPropagation();

            const btn = event.currentTarget;
            const icon = btn.querySelector('i');

            try {
                const response = await fetch('/api/favorites/toggle', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        hotel_id: hotelId,
                        hotel_data: hotelData
                    })
                });

                const result = await response.json();

                if (result.success) {
                    if (result.data.is_favorite) {
                        icon.className = 'bi bi-heart-fill text-danger';
                    } else {
                        icon.className = 'bi bi-heart';
                    }
                    loadFavoritesCount();
                }
            } catch (error) {
                console.error('Toggle favorite error:', error);
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorText').textContent = message;
        }
    </script>
</body>
</html>
