<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>酒店搜索比价 - 多平台价格对比，找到最低价</title>
    <meta name="description" content="全球酒店搜索比价平台，聚合多个OTA平台价格，帮您找到最优惠的酒店预订价格。支持国内外酒店搜索、价格对比、在线预订。">
    <meta name="keywords" content="酒店搜索,酒店比价,酒店预订,酒店价格对比,便宜酒店,全球酒店">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-building"></i> 酒店搜索
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#" id="favoritesLink">
                    <i class="bi bi-heart"></i> 收藏
                    <span class="badge bg-danger" id="favoritesCount">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <!-- Search Form -->
        <div class="search-container page-enter">
            <div class="text-center mb-4">
                <h1 class="display-4 fw-bold gradient-text">酒店搜索</h1>
                <p class="text-muted fs-6">
                    <i class="bi bi-globe2 me-1"></i>
                    全球酒店搜索 · Powered by <strong>RollingGo</strong>
                </p>
            </div>

            <form id="searchForm" class="search-form">
                <div class="search-main-section">
                    <!-- Destination - Most Prominent -->
                    <div class="destination-input-wrapper mb-4">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-primary text-white border-0">
                                <i class="bi bi-geo-alt-fill"></i>
                            </span>
                            <input type="text" class="form-control border-start-0" id="place"
                                   placeholder="输入目的地（景点、城市、机场、酒店...）" required>
                        </div>
                    </div>

                    <!-- Parameter Row 1 - Compact -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label small text-muted">地点类型</label>
                            <select class="form-select" id="placeType" required>
                                <option value="">选择类型...</option>
                                <option value="景点">景点</option>
                                <option value="城市">城市</option>
                                <option value="机场">机场</option>
                                <option value="火车站">火车站</option>
                                <option value="地铁站">地铁站</option>
                                <option value="区/县">区/县</option>
                                <option value="酒店">酒店</option>
                                <option value="详细地址">详细地址</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">入住日期</label>
                            <input type="date" class="form-control" id="checkInDate">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small text-muted">住宿晚数</label>
                            <div class="input-group">
                                <button type="button" class="btn btn-outline-secondary" onclick="adjustValue('stayNights', -1)">-</button>
                                <input type="number" class="form-control text-center" id="stayNights" value="1" min="1" max="30">
                                <button type="button" class="btn btn-outline-secondary" onclick="adjustValue('stayNights', 1)">+</button>
                            </div>
                        </div>
                    </div>

                    <!-- Parameter Row 2 - Guests -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small text-muted">成人数</label>
                            <div class="input-group">
                                <button type="button" class="btn btn-outline-secondary" onclick="adjustValue('adultCount', -1)">-</button>
                                <input type="number" class="form-control text-center" id="adultCount" value="2" min="1" max="10">
                                <button type="button" class="btn btn-outline-secondary" onclick="adjustValue('adultCount', 1)">+</button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">儿童数</label>
                            <div class="input-group">
                                <button type="button" class="btn btn-outline-secondary" onclick="adjustValue('childCount', -1)">-</button>
                                <input type="number" class="form-control text-center" id="childCount" value="0" min="0" max="10">
                                <button type="button" class="btn btn-outline-secondary" onclick="adjustValue('childCount', 1)">+</button>
                            </div>
                        </div>
                    </div>

                    <!-- Child Ages (hidden by default) -->
                    <div class="mb-3" id="childAgesContainer" style="display: none;">
                        <label class="form-label small text-muted">儿童年龄</label>
                        <div id="childAgesInputs" class="d-flex flex-wrap gap-2"></div>
                    </div>
                </div>

                <!-- Advanced Filters Toggle -->
                <div class="mt-3">
                    <button type="button" class="btn btn-link text-muted text-decoration-none p-0" data-bs-toggle="collapse" data-bs-target="#advancedFilters">
                        <i class="bi bi-sliders me-1"></i> 高级筛选
                        <i class="bi bi-chevron-down ms-1"></i>
                    </button>
                </div>

                <!-- Advanced Filters -->
                <div id="advancedFilters" class="collapse mt-3">
                    <div class="row g-3">
                        <!-- Star Rating -->
                        <div class="col-md-6">
                            <label class="form-label small text-muted">星级范围</label>
                            <select class="form-select" id="starRating">
                                <option value="">不限</option>
                                <option value="5.0,5.0">五星</option>
                                <option value="4.0,5.0">四星及以上</option>
                                <option value="3.0,5.0">三星及以上</option>
                            </select>
                        </div>

                        <!-- Max Price -->
                        <div class="col-md-6">
                            <label class="form-label small text-muted">最高价格（每晚）</label>
                            <input type="number" class="form-control" id="maxPrice" placeholder="不限" min="0">
                        </div>

                        <!-- Distance -->
                        <div class="col-md-6">
                            <label class="form-label small text-muted">最大距离（米）</label>
                            <input type="number" class="form-control" id="distance" placeholder="不限" min="0">
                        </div>

                        <!-- Result Size -->
                        <div class="col-md-6">
                            <label class="form-label small text-muted">结果数量</label>
                            <select class="form-select" id="resultSize">
                                <option value="10">10 条</option>
                                <option value="20" selected>20 条</option>
                                <option value="30">30 条</option>
                                <option value="50">50 条</option>
                                <option value="75">75 条</option>
                                <option value="100">100 条</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Search Button -->
                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5 py-3 rounded-pill">
                        <i class="bi bi-search me-2"></i> 搜索酒店
                    </button>
                </div>
            </form>
        </div>

        <!-- Search History -->
        <div class="mt-5" id="historySection" style="display: none;">
            <div class="card border-0" style="max-width: 700px; margin: 0 auto;">
                <div class="card-body">
                    <h5 class="mb-3">
                        <i class="bi bi-clock-history text-primary"></i> 最近搜索
                    </h5>
                    <div id="historyList" class="d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">正在搜索酒店...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Storage key for saved parameters
        const STORAGE_KEY = 'hotel_search_params';

        // Validate if date is not expired (today or future)
        function isValidDate(dateStr) {
            if (!dateStr) return false;
            const date = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return date >= today;
        }

        // Get default dates
        function getDefaultDates() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            return {
                tomorrow: tomorrow.toISOString().split('T')[0]
            };
        }

        // Save search parameters to localStorage
        function saveSearchParams() {
            const params = {
                place: document.getElementById('place').value,
                placeType: document.getElementById('placeType').value,
                checkInDate: document.getElementById('checkInDate').value,
                stayNights: document.getElementById('stayNights').value,
                adultCount: document.getElementById('adultCount').value,
                childCount: document.getElementById('childCount').value,
                childAges: getChildAges(),
                starRating: document.getElementById('starRating').value,
                maxPrice: document.getElementById('maxPrice').value,
                distance: document.getElementById('distance').value,
                resultSize: document.getElementById('resultSize').value,
                savedAt: new Date().toISOString()
            };

            localStorage.setItem(STORAGE_KEY, JSON.stringify(params));
        }

        // Load search parameters from localStorage
        function loadSearchParams() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return false;

            try {
                const params = JSON.parse(saved);
                const defaultDates = getDefaultDates();

                if (params.place) document.getElementById('place').value = params.place;
                if (params.placeType) document.getElementById('placeType').value = params.placeType;
                // Use saved date if valid, otherwise use default
                if (params.checkInDate && isValidDate(params.checkInDate)) {
                    document.getElementById('checkInDate').value = params.checkInDate;
                } else {
                    document.getElementById('checkInDate').value = defaultDates.tomorrow;
                }
                if (params.stayNights) document.getElementById('stayNights').value = params.stayNights;
                if (params.adultCount) document.getElementById('adultCount').value = params.adultCount;
                if (params.childCount) document.getElementById('childCount').value = params.childCount;
                if (params.childAges && params.childAges.length > 0) {
                    document.getElementById('childCount').value = params.childCount || 0;
                    updateChildAgesInputs();
                    params.childAges.forEach((age, i) => {
                        const input = document.getElementById(`childAge${i}`);
                        if (input) input.value = age;
                    });
                }
                if (params.starRating) document.getElementById('starRating').value = params.starRating;
                if (params.maxPrice) document.getElementById('maxPrice').value = params.maxPrice;
                if (params.distance) document.getElementById('distance').value = params.distance;
                if (params.resultSize) document.getElementById('resultSize').value = params.resultSize;

                return true;
            } catch (e) {
                console.error('Failed to load saved params:', e);
                return false;
            }
        }

        // Initialize index page
        document.addEventListener('DOMContentLoaded', function() {
            // Set default dates
            const defaultDates = getDefaultDates();

            // Set date min values
            document.getElementById('checkInDate').min = defaultDates.tomorrow;

            // Try to load saved parameters first
            const loaded = loadSearchParams();

            // If no saved params or dates expired, set default dates
            if (!loaded || !isValidDate(document.getElementById('checkInDate').value)) {
                document.getElementById('checkInDate').value = defaultDates.tomorrow;
            }

            // Load favorites count
            loadFavoritesCount();

            // Load search history
            loadSearchHistory();
        });

        // Search form submission
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            performSearch();
        });

        function performSearch() {
            const place = document.getElementById('place').value.trim();
            const placeType = document.getElementById('placeType').value;

            if (!place || !placeType) {
                alert('请填写目的地并选择地点类型');
                return;
            }

            const searchData = {
                provider: 'rollinggo',
                query: `Find hotels near ${place}`,
                place: place,
                place_type: placeType,
                check_in_date: document.getElementById('checkInDate').value || null,
                stay_nights: parseInt(document.getElementById('stayNights').value),
                adult_count: parseInt(document.getElementById('adultCount').value),
                child_count: parseInt(document.getElementById('childCount').value),
                child_ages: getChildAges(),
                star_ratings: document.getElementById('starRating').value || null,
                max_price: parseFloat(document.getElementById('maxPrice').value) || null,
                distance: parseInt(document.getElementById('distance').value) || null,
                size: parseInt(document.getElementById('resultSize').value)
            };

            sessionStorage.setItem('searchPlace', place);

            // Store search data in session storage
            sessionStorage.setItem('searchData', JSON.stringify(searchData));
            sessionStorage.setItem('currentProvider', 'rollinggo');

            // Save search parameters to localStorage for next session
            saveSearchParams();

            // Show loading and redirect
            showLoading();
            window.location.href = '/results';
        }

        function getChildAges() {
            const childCount = parseInt(document.getElementById('childCount').value);
            const ages = [];
            for (let i = 0; i < childCount; i++) {
                const input = document.getElementById(`childAge${i}`);
                ages.push(input ? parseInt(input.value) : 5);
            }
            return ages;
        }

        // Child count change handler
        document.getElementById('childCount').addEventListener('change', updateChildAgesInputs);
        document.getElementById('childCount').addEventListener('input', updateChildAgesInputs);

        function updateChildAgesInputs() {
            const count = parseInt(document.getElementById('childCount').value);
            const container = document.getElementById('childAgesContainer');
            const inputsDiv = document.getElementById('childAgesInputs');

            if (count > 0) {
                container.style.display = 'block';
                inputsDiv.innerHTML = '';

                for (let i = 0; i < count; i++) {
                    const div = document.createElement('div');
                    div.className = 'input-group';
                    div.style.width = '100px';
                    div.innerHTML = `
                        <span class="input-group-text">儿童${i + 1}</span>
                        <input type="number" class="form-control" id="childAge${i}"
                               value="5" min="0" max="17">
                    `;
                    inputsDiv.appendChild(div);
                }
            } else {
                container.style.display = 'none';
            }
        }
    </script>

</body>
</html>
