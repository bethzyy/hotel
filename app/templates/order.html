<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预订结果 - 酒店搜索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-building"></i> 酒店搜索
            </a>
        </div>
    </nav>

    <main class="container py-5">
        <!-- Success Content -->
        <div id="successContent" style="display: none;">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <!-- Success Card -->
                    <div class="card border-0 text-center mb-4 page-enter">
                        <div class="card-body py-5">
                            <div class="order-success-icon mx-auto">
                                <i class="bi bi-check-lg"></i>
                            </div>
                            <h3 class="text-success mb-3 fw-bold">预订成功！</h3>
                            <p class="text-muted mb-4">您的酒店预订已提交，请尽快完成支付</p>

                            <!-- Order Info -->
                            <div class="bg-light rounded-4 p-4 text-start mb-4">
                                <div class="row g-4">
                                    <div class="col-6">
                                        <small class="text-muted d-block mb-1">订单号</small>
                                        <span id="orderId" class="fw-bold fs-6"></span>
                                    </div>
                                    <div class="col-6">
                                        <small class="text-muted d-block mb-1">确认号</small>
                                        <span id="confirmationNumber" class="fw-bold fs-6"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- Payment Button -->
                            <div id="paymentSection">
                                <a id="paymentUrl" href="#" class="btn btn-primary btn-lg w-100 mb-3" target="_blank" style="border-radius: var(--radius-xl);">
                                    <i class="bi bi-credit-card me-2"></i> 立即支付
                                </a>
                                <p class="text-muted small">
                                    <i class="bi bi-clock me-1"></i>
                                    请在30分钟内完成支付，超时订单将自动取消
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Order Details -->
                    <div class="card border-0 mb-4">
                        <div class="card-header bg-transparent border-0 pt-4 pb-0 px-4">
                            <h5 class="mb-0 fw-bold">
                                <i class="bi bi-receipt text-primary me-2"></i> 订单详情
                            </h5>
                        </div>
                        <div class="card-body p-4">
                            <div id="orderDetails">
                                <!-- Will be populated from session storage -->
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-3 mt-4">
                        <a href="/" class="btn btn-outline-primary flex-fill" style="border-radius: var(--radius-lg);">
                            <i class="bi bi-search me-2"></i> 继续搜索
                        </a>
                        <button onclick="window.print()" class="btn btn-outline-secondary" style="border-radius: var(--radius-lg);">
                            <i class="bi bi-printer me-2"></i> 打印
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Content -->
        <div id="errorContent" style="display: none;">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card border-0 text-center page-enter">
                        <div class="card-body py-5">
                            <div class="order-error-icon mx-auto">
                                <i class="bi bi-x-lg"></i>
                            </div>
                            <h3 class="text-danger mb-3 fw-bold">预订失败</h3>
                            <p id="errorMessage" class="text-muted mb-4"></p>

                            <div class="d-flex gap-3 justify-content-center">
                                <button onclick="window.history.back()" class="btn btn-primary" style="border-radius: var(--radius-lg);">
                                    <i class="bi bi-arrow-left me-2"></i> 返回修改
                                </button>
                                <a href="/" class="btn btn-outline-primary" style="border-radius: var(--radius-lg);">
                                    <i class="bi bi-search me-2"></i> 重新搜索
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- No Order Data -->
        <div id="noDataContent" style="display: none;">
            <div class="row justify-content-center">
                <div class="col-lg-6 text-center page-enter">
                    <div class="empty-state-icon mx-auto">
                        <i class="bi bi-inbox"></i>
                    </div>
                    <h4 class="mt-4 mb-2">未找到订单信息</h4>
                    <p class="text-muted mb-4">请从酒店详情页选择房型后进行预订</p>
                    <a href="/" class="btn btn-primary btn-lg" style="border-radius: var(--radius-xl);">
                        <i class="bi bi-search me-2"></i> 搜索酒店
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Get order data from session storage
            const orderDataStr = sessionStorage.getItem('orderData');
            const bookingDataStr = sessionStorage.getItem('bookingData');

            if (!orderDataStr) {
                document.getElementById('noDataContent').style.display = 'block';
                return;
            }

            const orderData = JSON.parse(orderDataStr);
            const bookingData = bookingDataStr ? JSON.parse(bookingDataStr) : null;

            renderOrderResult(orderData, bookingData);
        });

        function renderOrderResult(order, booking) {
            if (order.success === false) {
                // Show error
                document.getElementById('errorContent').style.display = 'block';
                document.getElementById('errorMessage').textContent = order.error || '预订过程中发生错误';
                return;
            }

            // Show success
            document.getElementById('successContent').style.display = 'block';

            // Order IDs
            document.getElementById('orderId').textContent = order.order_id || '-';
            document.getElementById('confirmationNumber').textContent = order.confirmation_number || '-';

            // Payment URL
            if (order.payment_url) {
                document.getElementById('paymentUrl').href = order.payment_url;
            } else {
                document.getElementById('paymentSection').style.display = 'none';
            }

            // Order details from booking data
            if (booking) {
                const detailsHtml = `
                    <div class="mb-4">
                        <div class="d-flex align-items-start">
                            <div class="rounded-3 overflow-hidden me-3" style="width: 80px; height: 80px; flex-shrink: 0;">
                                ${booking.hotel?.image_url ? `<img src="${booking.hotel.image_url}" style="width: 100%; height: 100%; object-fit: cover;">` : '<div class="w-100 h-100 bg-light d-flex align-items-center justify-content-center"><i class="bi bi-building text-muted fs-4"></i></div>'}
                            </div>
                            <div>
                                <strong class="d-block fs-6">${booking.hotel?.name || '酒店'}</strong>
                                <small class="text-muted">${booking.hotel?.address || ''}</small>
                            </div>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="row g-4">
                        <div class="col-6">
                            <small class="text-muted d-block mb-1">房型</small>
                            <span class="fw-medium">${booking.selected_room?.name || '标准房'}</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block mb-1">房间数</small>
                            <span class="fw-medium">${booking.room_count || 1} 间</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block mb-1">入住日期</small>
                            <span class="fw-medium">${booking.check_in}</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block mb-1">离店日期</small>
                            <span class="fw-medium">${booking.check_out}</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block mb-1">住宿</small>
                            <span class="fw-medium">${booking.nights} 晚</span>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block mb-1">入住人数</small>
                            <span class="fw-medium">${booking.adult_count || 2} 成人</span>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex justify-content-between align-items-center p-3 rounded-3" style="background: linear-gradient(135deg, var(--primary-50), white);">
                        <span class="fw-medium">订单金额</span>
                        <span class="text-primary fw-bold fs-5" style="font-family: var(--font-number);">
                            ${booking.selected_room?.currency || '¥'}${(booking.selected_room?.price || 0) * booking.nights * (booking.room_count || 1)}
                        </span>
                    </div>
                `;
                document.getElementById('orderDetails').innerHTML = detailsHtml;
            }
        }
    </script>
</body>
</html>
